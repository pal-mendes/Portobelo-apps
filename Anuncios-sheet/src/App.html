    const el = document.getElementById('mensagem-submissao') || document.getElementById('contador');
    if (el) el.textContent = 'Erro JavaScript: ' + e.message;

  let myPhones = [];
  let myAds = [];
  let selectedMyAds = [];
  let sortDirection = -1; // descendente
  let sortColumn = 0;     // ordenar por "Anúncio" por omissão

  document.addEventListener('DOMContentLoaded', function() { loadTable(); });

  function loadTable() {
    log("loadTable()");
    document.getElementById('spinner').style.display = 'block';
    google.script.run
    .withSuccessHandler(function(response) {
      log("loadTable: getAnunciosDataSess success");
      log("loadTable: response =", response || null);

      document.getElementById('spinner').style.display = 'none';
      // Proteção contra erro se a resposta não for o objeto esperado

        log('Falha ao obter formato de anúncios');

      }

      isEmDia = response.isEmDia; // Recolhe o estatutO

      sortDirection = -1; // mais recentes primeiro
      setupFilters();
      applyFilters();
      updateSortIcons();

      // Constrói a gestão de "Os Meus Anúncios" logo acima do formulário
      renderMyAdsUI();

      google.script.run
      .withSuccessHandler(function(novaData) {
        const el = document.getElementById('atualizacao'); 
        if (el) el.textContent = novaData;
      })
      .withFailureHandler(function(err) {
        log('getUltimaAtualizacao ERROR: ' + err);
        const el = document.getElementById('atualizacao');
        if (el) el.textContent = 'Erro';
      })      
      .getUltimaAtualizacao();
    })
    .withFailureHandler(function(err) {
      document.getElementById('spinner').style.display = 'none';
      log('getAnunciosDataSess ERROR: ' + err);
      var el = document.getElementById('contador'); 
      if (el) el.textContent = 'Erro ao carregar dados (' + err + ')';
    })
    .getAnunciosDataSess(SESSION_TICKET);
  }

  // FORMATA O PREÇO (Ex: 5500 -> 5 500€)
  function formatarPreco(valor) {
     if (!valor) return '';
     let v = String(valor).trim();
     let apenasNumeros = v.replace(/\D/g, ''); // Remove pontos e vírgulas (ex: 5.500 fica 5500)
     if (apenasNumeros.length > 0) {
         return apenasNumeros.replace(/\B(?=(\d{3})+(?!\d))/g, " ") + '€';
     }
     return v; // Se for texto puro (ex: "Sob consulta"), devolve como está
  }

  function normalizePhone(raw) {
    if (!raw) return { ok: false };
        
    // Limpa absolutamente tudo o que não seja número
    //const digits = String(raw || '').replace(/\D/g, '');
    const digits = String(raw || '').replace(/\D/g, '').replace(/^0+/, '');

    // Validação mínima (um número português tem pelo menos 9 dígitos)
    if (digits.length < 9) return { ok: false };
      
    let d = digits;
    if (d.length === 9) d = '351' + d;       // PT (default)
    else if (d.length === 10) d = '00' + d;  // Outros países
    else if (d.length === 11) d = '0' + d;  // ex.: +33 -> 11 dígitos no total, com 0 ficam 12
    else if (d.length < 12 || d.length > 15) return { ok:false }; //Há países com mais de 12 dígitos, mas com menos não pode haver
    //const pretty = d.slice(0,3)+' '+d.slice(3,6)+' '+d.slice(6,9)+' '+d.slice(9,12) + (d.length>12 ? (' '+d.slice(12)) : '');
    let pretty = d.replace(/\B(?=(\d{3})+(?!\d))/g, " ");
    return { ok:true, digits:d, pretty:pretty };
  }

  // ====== NOVA MAGIA: GESTÃO DE ANÚNCIOS (CMS) ======

  function ownsPhone(phoneStr) {
     const d = String(phoneStr).replace(/\D/g, '');
     return myPhones.some(my => my.endsWith(d) || d.endsWith(my));
  }

  function renderMyAdsUI() {
    let container = document.getElementById('my-ads-container');
    if (!container) {
      container = document.createElement('div');
      container.id = 'my-ads-container';
      
      // Regras estritas para blindar contra estilos antigos do formulário
      container.style.display = 'block';
      container.style.width = '100%';
      container.style.boxSizing = 'border-box';
      container.style.textAlign = 'left';
      container.style.marginBottom = '25px';
      container.style.padding = '15px';
      container.style.backgroundColor = '#f9fafb';
      container.style.border = '1px solid #e5e7eb';
      container.style.borderRadius = '8px';
      
      const formEl = document.getElementById('formulario');
      formEl.insertBefore(container, formEl.firstChild);
    }
    
    myAds = rawData.filter(ad => ad[7] === true);
    selectedMyAds = []; // Reseta seleções
    
    if (myAds.length === 0) {
      container.innerHTML = '<p style="margin:0; color:#666; font-size:14px; text-align:left;">Não tem anúncios ativos associados aos seus telemóveis neste momento.</p>';
    } else {
      let html = '<h4 style="margin-top:0; margin-bottom:12px; color:#111; font-size:15px; text-align:left;">Os Meus Anúncios Ativos</h4>';
      
      html += '<div style="display:block; width:100%;">';
      
      myAds.forEach((ad, i) => {
          let desc = ad[3].length > 160 ? ad[3].substring(0,160) + '...' : ad[3];
          let dataPub = ad[0];
          let pForm = formatarPreco(ad[5]);
          let precoStr = pForm ? `<span style="color:#059669; font-weight:bold; margin-left:8px;">${pForm}</span>` : '';
          
          let status = ad[6] || 'Sim';
          let badge = '';
          if (status === 'Pendente') badge = '<span style="background: #fef08a; color: #854d0e; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-left:8px;">Pendente</span>';
          else if (status === 'Não') badge = '<span style="background: #fecaca; color: #991b1b; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-left:8px;">Rejeitado</span>';
          else badge = '<span style="background: #bbf7d0; color: #166534; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-left:8px;">Aprovado</span>';
          
          // A MAGIA DA PROTEÇÃO: CSS Grid! O primeiro elemento tem 24px fixos, o texto tem o resto.
          html += `<label style="display: grid; grid-template-columns: 24px 1fr; gap: 8px; align-items: start; padding: 12px; border-radius: 6px; background: #fff; border: 1px solid #ddd; width: 100%; box-sizing: border-box; margin-bottom: 8px; cursor: pointer; text-align: left;">
                      <div style="padding-top: 2px;">
                        <input type="checkbox" class="my-ad-chk" data-idx="${i}" style="margin: 0; transform: scale(1.1);">
                      </div>
                      <div style="display: block; width: 100%; overflow: hidden;">
                        <div style="font-weight: 600; color: #333; margin-bottom: 4px; display: block;">
                          <span style="color:#000;">${dataPub}</span> &middot; ${ad[1]} <span style="font-weight:normal; color:#666; margin-left:4px;">(${ad[2]})</span>
                          ${precoStr} ${badge}
                        </div>
                        <div style="color: #555; display: block; line-height: 1.4; word-break: normal; overflow-wrap: break-word;">${desc}</div>
                      </div>
                    </label>`;
      });
      html += '</div>';
      html += '<div style="margin-top:10px; font-size:12px; color:#888; text-align:left;">(Selecione 1 anúncio para o Editar, ou vários para os Apagar)</div>';
      container.innerHTML = html;
      
      document.querySelectorAll('.my-ad-chk').forEach(chk => {
          chk.addEventListener('change', handleAdSelection);
      });
    }
    setupFormButtons();
  }

  function setupFormButtons() {
     const btnOriginal = document.getElementById('botaoSubmeter');
     if (!btnOriginal) return;
     
     // Recicla o botão existente para "Publicar"
     btnOriginal.textContent = 'Publicar anúncio';
     btnOriginal.onclick = function(e) { e.preventDefault(); processarGestao('add'); };
     
     // Cria o botão de Atualizar
     let btnUpdate = document.getElementById('btnAtualizar');
     if (!btnUpdate) {
        btnUpdate = document.createElement('button');
        btnUpdate.id = 'btnAtualizar';
        btnUpdate.textContent = 'Atualizar anúncio';
        btnUpdate.style.display = 'none';
        btnUpdate.style.marginLeft = '12px';
        btnUpdate.style.padding = '8px 16px';
        btnUpdate.style.backgroundColor = '#2563eb'; // Azul premium
        btnUpdate.style.color = '#fff';
        btnUpdate.style.border = 'none';
        btnUpdate.style.borderRadius = '6px';
        btnUpdate.style.cursor = 'pointer';
        btnUpdate.onclick = function(e) { e.preventDefault(); processarGestao('update'); };
        btnOriginal.parentNode.insertBefore(btnUpdate, btnOriginal.nextSibling);
     }
     
     // Cria o botão de Apagar
     let btnDelete = document.getElementById('btnApagar');
     if (!btnDelete) {
        btnDelete = document.createElement('button');
        btnDelete.id = 'btnApagar';
        btnDelete.textContent = 'Apagar anúncio(s)';
        btnDelete.style.display = 'none';
        btnDelete.style.marginLeft = '12px';
        btnDelete.style.padding = '8px 16px';
        btnDelete.style.backgroundColor = '#dc2626'; // Vermelho perigo
        btnDelete.style.color = '#fff';
        btnDelete.style.border = 'none';
        btnDelete.style.borderRadius = '6px';
        btnDelete.style.cursor = 'pointer';
        btnDelete.onclick = function(e) { e.preventDefault(); processarGestao('delete'); };
        btnUpdate.parentNode.insertBefore(btnDelete, btnUpdate.nextSibling);
     }
     
     handleAdSelection(); // Aplica visibilidade base
  }

  function handleAdSelection() {
     const chks = document.querySelectorAll('.my-ad-chk');
     selectedMyAds = [];
     chks.forEach(chk => { if (chk.checked) selectedMyAds.push(myAds[chk.getAttribute('data-idx')]); });
     
     const btnOriginal = document.getElementById('botaoSubmeter');
     const btnUpdate = document.getElementById('btnAtualizar');
     const btnDelete = document.getElementById('btnApagar');
     
     if (selectedMyAds.length === 0) {
        // Nada selecionado -> Modo Criação
        document.getElementById('anuncioTelefone').value = '';
        document.getElementById('anuncioTipo').selectedIndex = 0; 
        document.getElementById('anuncioEntrada').value = '';
        document.getElementById('anuncioDescricao').value = '';
        document.getElementById('anuncioPreco').value = '';
        
        if(btnOriginal) btnOriginal.style.display = 'inline-block';
        if(btnUpdate) btnUpdate.style.display = 'none';
        if(btnDelete) btnDelete.style.display = 'none';
     } else if (selectedMyAds.length === 1) {
        // 1 selecionado -> Modo Edição. Copia os valores para o form!
        const ad = selectedMyAds[0];
        
        const tipoSel = document.getElementById('anuncioTipo');
        for(let i=0; i<tipoSel.options.length; i++){
            if(tipoSel.options[i].value === ad[1] || tipoSel.options[i].text === ad[1]) {
                tipoSel.selectedIndex = i; break;
            }
        }

        // NOVO: Seleciona o telemóvel correto na lista suspensa se houver números registados
        const telEl = document.getElementById('anuncioTelefone');
        if (telEl.tagName.toLowerCase() === 'select') {
            const adTelD = ad[2].replace(/\D/g, '');
            for(let i=0; i<telEl.options.length; i++){
                const optVal = telEl.options[i].value.replace(/\D/g, '');
                if(optVal === adTelD || optVal.endsWith(adTelD) || adTelD.endsWith(optVal)) {
                    telEl.selectedIndex = i; break;
                }
            }
        } else {
            telEl.value = ad[2]; // Preenche a caixa de texto livre
        }

        document.getElementById('anuncioDescricao').value = ad[3];
        document.getElementById('anuncioEntrada').value = ad[4] || '';
        document.getElementById('anuncioPreco').value = ad[5] || '';
        
        if(btnOriginal) btnOriginal.style.display = 'none';
        if(btnUpdate) btnUpdate.style.display = 'inline-block';
        if(btnDelete) btnDelete.style.display = 'inline-block';
     } else {
        // Vários selecionados -> Modo Destruição
        document.getElementById('anuncioTelefone').value = '';
        document.getElementById('anuncioDescricao').value = '';
        document.getElementById('anuncioEntrada').value = '';
        document.getElementById('anuncioPreco').value = '';
        
        if(btnOriginal) btnOriginal.style.display = 'none';
        if(btnUpdate) btnUpdate.style.display = 'none';
        if(btnDelete) btnDelete.style.display = 'inline-block';
     }
  }

  function processarGestao(action) {
     if (envioEmCurso) return;
     
     const telRaw = document.getElementById('anuncioTelefone').value;
     const tipo = (document.getElementById('anuncioTipo').value || '').trim();
     const descricao = (document.getElementById('anuncioDescricao').value || '').trim();
     const entrada = (document.getElementById('anuncioEntrada').value || '').trim();
     const preco = (document.getElementById('anuncioPreco').value || '').trim(); // Captura preço
     
     let payload = { action: action };
     
     if (action === 'add' || action === 'update') {
        const norm = normalizePhone(telRaw);
        if (!norm.ok) { alert('Número de telemóvel inválido.'); return; }
        if (!tipo) { alert('Selecione o tipo de anúncio.'); return; }
        if (descricao.length < 10) { alert('A descrição deve ter pelo menos 10 caracteres.'); return; }
        if (tipo === 'Venda na Internet' && !preco) { alert('O preço é obrigatório para anúncios Venda na Internet.'); return; }
        payload.novo = ['', tipo, norm.pretty, descricao, entrada, preco];
     }
     if (action === 'update') payload.original = selectedMyAds[0];
     if (action === 'delete') {
        if (!confirm('Tem a certeza que deseja apagar ' + selectedMyAds.length + ' anúncio(s)?')) return;
        payload.originais = selectedMyAds;
     }
     
     envioEmCurso = true;
     document.getElementById('spinner').style.display = 'block';
     
     const btnOriginal = document.getElementById('botaoSubmeter');
     const btnUpdate = document.getElementById('btnAtualizar');
     const btnDelete = document.getElementById('btnApagar');
     if(btnOriginal) btnOriginal.disabled = true;
     if(btnUpdate) btnUpdate.disabled = true;
     if(btnDelete) btnDelete.disabled = true;
     
     google.script.run.withSuccessHandler(function() {
        const msg = document.getElementById('mensagem-submissao');
        if (msg) {
           if (action === 'add') msg.textContent = '✅ Anúncio publicado com sucesso!';
           if (action === 'update') msg.textContent = '✅ Anúncio atualizado com sucesso!';
           if (action === 'delete') msg.textContent = '✅ Anúncio(s) apagado(s) com sucesso!';
           msg.style.display = 'block';
           setTimeout(function(){ msg.style.display = 'none'; }, 6000);
        }
        
        envioEmCurso = false;
        document.getElementById('anuncioTelefone').value = '';
        document.getElementById('anuncioDescricao').value = '';
        document.getElementById('anuncioEntrada').value = '';
        document.getElementById('anuncioPreco').value = '';

        if(btnOriginal) btnOriginal.disabled = false;
        if(btnUpdate) btnUpdate.disabled = false;
        if(btnDelete) btnDelete.disabled = false;
        
        loadTable(); // Recarrega a tabela final e as caixas de seleção
     }).withFailureHandler(function(err){
        document.getElementById('spinner').style.display = 'none';
        alert(err.message);
        envioEmCurso = false;
        if(btnOriginal) btnOriginal.disabled = false;
        if(btnUpdate) btnUpdate.disabled = false;
        if(btnDelete) btnDelete.disabled = false;
     }).apiGestaoAnuncios(SESSION_TICKET, payload);
  }

  // BLOQUEIA E DESBLOQUEIA A DROPDOWN CONFORME ESTATUTO DO MEMBRO
  function updateFormOptions() {
     const select = document.getElementById('anuncioTipo');
     if (!select) return;
     Array.from(select.options).forEach(opt => {
        if (!isEmDia) {
           if (opt.value !== "" && opt.value !== "Compra na Internet") opt.style.display = 'none';
           else opt.style.display = '';
        } else {
           if (opt.value === "Compra na Internet") opt.style.display = 'none';
           else opt.style.display = '';
        }
     });
     select.addEventListener('change', function() {
        const pInput = document.getElementById('anuncioPreco');
        if (pInput) pInput.placeholder = (this.value === 'Venda na Internet') ? 'Obrigatório' : 'Opcional';
     });
  }

  // ATUALIZAÇÃO DOS FILTROS (INCLUI O PREÇO NA PESQUISA DA TABELA)
  function setupFilters() {
    const inputs = ['filtroAnuncio', 'filtroTipo', 'filtroTelefone', 'filtroDescricao', 'filtroEntrada', 'filtroPreco'];
    inputs.forEach(id => {
      const el = document.getElementById(id);
      if (el) {
          el.addEventListener('input', applyFilters);
          if (el.tagName === 'SELECT') el.addEventListener('change', applyFilters);
      }
    });
  }

  // 3. ATUALIZA AS SETAS (Cores Fortes e Lógica Corrigida)
  function updateSortIcons() {
     const icons = document.querySelectorAll('#header-row .sort-icon');
     icons.forEach((icon, index) => {
        if (index === sortColumn) {
           // Lógica invertida: Direção -1 (Decrescente / Mais recente primeiro) = Seta para Baixo (▼)
           icon.innerHTML = sortDirection === 1 ? '&#9650;' : '&#9660;'; 
           icon.style.color = '#2563eb'; // Azul forte para dar foco à coluna ativa
           icon.style.fontWeight = 'bold';
           icon.style.opacity = '1';
        } else {
           icon.innerHTML = '&#8597;'; // ↕
           icon.style.color = '#777'; // Cinza escuro para ser claramente visível
           icon.style.fontWeight = 'bold';
           icon.style.opacity = '0.6';
        }
     });
  }

  window.ordenarTabela = function(colIndex) {
     if (sortColumn === colIndex) {
        sortDirection *= -1; // Se já está nesta coluna, inverte
     } else {
        sortColumn = colIndex;
        sortDirection = 1; // Nova coluna, começa com V (crescente)
     }
     updateSortIcons();
     applyFilters();
  };

  function applyFilters() {
    const fAnuncio = (document.getElementById('filtroAnuncio')?.value || '').toLowerCase();
     const fTipo = (document.getElementById('filtroTipo')?.value || '').toLowerCase();
     const fTelefone = (document.getElementById('filtroTelefone')?.value || '').toLowerCase();
     const fDescricao = (document.getElementById('filtroDescricao')?.value || '').toLowerCase();
     const fEntrada = (document.getElementById('filtroEntrada')?.value || '').toLowerCase();
     const fPreco = (document.getElementById('filtroPreco')?.value || '').toLowerCase().replace(/[\s€]/g, '');

     let filtered = rawData.filter(row => {
        if (fAnuncio && !String(row[0]).toLowerCase().includes(fAnuncio)) return false;
        if (fTipo && !String(row[1]).toLowerCase().includes(fTipo)) return false;
        if (fTelefone && !String(row[2]).toLowerCase().replace(/\s/g,'').includes(fTelefone.replace(/\s/g,''))) return false;
        if (fDescricao && !String(row[3]).toLowerCase().includes(fDescricao)) return false;
        if (fEntrada && !String(row[4]).toLowerCase().includes(fEntrada)) return false;
        if (fPreco) {
           let rawPreco = String(row[5] || '').toLowerCase().replace(/[\s€]/g, '');
           if (!rawPreco.includes(fPreco)) return false;
        }
        return true;
     });
          
     // Aplica a ordenação selecionada pelas setas
     if (sortColumn >= 0) {
        filtered.sort((a, b) => {
           let valA = String(a[sortColumn] || '').toLowerCase();
           let valB = String(b[sortColumn] || '').toLowerCase();
           if (valA < valB) return -1 * sortDirection;
           if (valA > valB) return 1 * sortDirection;
           return 0;
        });
     }

     // renderTable é a sua função original que desenha as linhas da tabela no ecrã
     renderTable(filtered);
  }

  // FUNÇÃO QUE DESENHA A TABELA NO ECRÃ
  // NOTA na renderTable(): ao fazer "row.forEach", faça "row.slice(0, 6).forEach" para desenhar apenas até ao Preço (escondendo a coluna Aprovação que vem do Sheets).

  function renderTable(data) {
     const tbody = document.querySelector('table tbody');
     if (!tbody) {
        console.error("Erro fatal: A etiqueta <tbody> não foi encontrada no Main.html!");
        return;
     }
     
     tbody.innerHTML = ''; // Limpa as linhas antigas
     
     // Atualiza o contador de anúncios visíveis lá em cima
     const contador = document.getElementById('contador');
     if (contador) contador.textContent = `Total: ${data.length} anúncio(s)`;
     
     if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="padding: 30px; text-align: center; color: #777; font-size: 15px;">Nenhum anúncio encontrado com estes filtros.</td></tr>';
        return;
     }
     
     // Desenha as linhas novas
     data.forEach(row => {
        const tr = document.createElement('tr');
        tr.style.borderBottom = '1px solid #eaeaea';
        
        row.slice(0, 6).forEach((cellText, index) => {
           const td = document.createElement('td');
           td.style.padding = '12px 8px';
           td.style.verticalAlign = 'top';
           td.style.fontSize = '14px';
           td.style.color = '#333';
           
           // A primeira coluna (Data) e a última (Entrada) não devem quebrar de linha
           if (index === 0 || index === 4 || index === 5) {
               td.style.whiteSpace = 'nowrap';
           }

           // Aplica o Formato e a Cor ao Preço (Índice 5)
           if (index === 5) {
               cellText = formatarPreco(cellText);
               if (cellText) {
                   td.style.fontWeight = '600';
                   td.style.color = '#059669'; // Verde elegante para dinheiro
               }
           }
           
           td.textContent = cellText;
           tr.appendChild(td);
        });
        tbody.appendChild(tr);
     });
  }

  function createTable(data) {
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = '';
    data.forEach(row => {
      const tr = document.createElement('tr');
      row.forEach((cell, i) => {
        const td = document.createElement('td');
        td.textContent = formatCell(cell, i);
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    const total = document.getElementById('contador');
    if (total) total.textContent = 'Total: ' + data.length + ' anúncios';
  }

  function formatCell(cell, index) {
    if (index === 0) {
      const date = new Date(cell);
      if (!isNaN(date)) return date.toISOString().split('T')[0];
    }
    return cell;
  }

  function toggleFormulario() {
    const f = document.getElementById('formulario');
    const isVisible = (f.style.display === 'block');
    f.style.display = isVisible ? 'none' : 'block';
    if (!isVisible) window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function populatePhoneDropdown() {
     let phoneEl = document.getElementById('anuncioTelefone');
     if (!phoneEl) return;
     
     // Se for utilizador não registado (ou sem telemóveis), muda para caixa de texto livre
     if (!isEmDia || myPhones.length === 0) {
         const input = document.createElement('input');
         input.type = 'text';
         input.id = 'anuncioTelefone';
         input.placeholder = 'Escreva o seu telemóvel';
         input.style.cssText = 'width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; box-sizing: border-box;';
         phoneEl.parentNode.replaceChild(input, phoneEl);
         return;
     }
     
     // Caso contrário, garante que é uma Dropdown
     if (phoneEl.tagName.toLowerCase() !== 'select') {
         const select = document.createElement('select');
         select.id = 'anuncioTelefone';
         select.style.cssText = 'width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; box-sizing: border-box;';
         phoneEl.parentNode.replaceChild(select, phoneEl);
         phoneEl = select;
     }
     
     phoneEl.innerHTML = '';
     myPhones.forEach(p => {
        const norm = normalizePhone(p);
        const formatado = norm.ok ? norm.pretty : p;
        const opt = document.createElement('option');
        opt.value = formatado;
        opt.textContent = formatado;
        phoneEl.appendChild(opt);
     });
  }
</script>
