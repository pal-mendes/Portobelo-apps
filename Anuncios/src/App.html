<script>
  // Proteções básicas
  window.addEventListener('error', function (e) {
    const el = document.getElementById('mensagem-submissao') || document.getElementById('contador');
    if (el) el.textContent = 'Erro JavaScript: ' + e.message;
  });

  let rawData = [];
  let myPhones = [];
  let myAds = [];
  let selectedMyAds = [];
  let sortDirection = -1; // descendente
  let sortColumn = 0;     // ordenar por "Anúncio" por omissão
  let envioEmCurso = false;

  document.addEventListener('DOMContentLoaded', function() { loadTable(); });

  function loadTable() {
    document.getElementById('spinner').style.display = 'block';
    google.script.run
    .withSuccessHandler(function(response) {
      document.getElementById('spinner').style.display = 'none';
      // Proteção contra erro se a resposta não for o objeto esperado
      if (!response || !Array.isArray(response.adds)) {
        log('Falha ao obter formato de anúncios');
        return; 
      }

      rawData = response.filter(r => r.some(c => c !== '' && c != null));
      myPhones = response.myPhones || [];
      populatePhoneDropdown(); // <--- INJETA OS TELEMÓVEIS NA LISTA SUSPENSA
      
      sortColumn = 0; // data
      sortDirection = -1; // mais recentes primeiro
      setupFilters();
      applyFilters();
      updateSortIcons();

      // Constrói a gestão de "Os Meus Anúncios" logo acima do formulário
      renderMyAdsUI();

      google.script.run
      .withSuccessHandler(function(novaData) {
        const el = document.getElementById('atualizacao'); 
        if (el) el.textContent = novaData;
      })
      .withFailureHandler(function(err) {
        log('getUltimaAtualizacao ERROR: ' + err);
        const el = document.getElementById('atualizacao');
        if (el) el.textContent = 'Erro';
      })      
      .getUltimaAtualizacao();
    })
    .withFailureHandler(function(err) {
      document.getElementById('spinner').style.display = 'none';
      log('getAnunciosDataSess ERROR: ' + err);
      var el = document.getElementById('contador'); 
      if (el) el.textContent = 'Erro ao carregar dados (' + err + ')';
    })
    .getAnunciosDataSess(SESSION_TICKET);
  }

  function normalizePhone(raw) {
    const digits = String(raw || '').replace(/\D/g, '').replace(/^0+/, '');
    let d = digits;
    if (d.length === 9) d = '351' + d;       // PT
    else if (d.length === 10) d = '00' + d;  // ex.: +33 -> 11 dígitos…
    else if (d.length === 11) d = '0' + d;
    if (d.length < 12 || d.length > 15) return { ok:false };
    const pretty = d.slice(0,3)+' '+d.slice(3,6)+' '+d.slice(6,9)+' '+d.slice(9,12) + (d.length>12 ? (' '+d.slice(12)) : '');
    return { ok:true, digits:d, pretty:pretty };
  }

  // ====== NOVA MAGIA: GESTÃO DE ANÚNCIOS (CMS) ======

  function ownsPhone(phoneStr) {
     const d = String(phoneStr).replace(/\D/g, '');
     return myPhones.some(my => my.endsWith(d) || d.endsWith(my));
  }

  function renderMyAdsUI() {
     let container = document.getElementById('my-ads-container');
     if (!container) {
        container = document.createElement('div');
        container.id = 'my-ads-container';
        container.style.marginBottom = '25px';
        container.style.padding = '15px';
        container.style.backgroundColor = '#f9fafb';
        container.style.border = '1px solid #e5e7eb';
        container.style.borderRadius = '8px';
        
        const formEl = document.getElementById('formulario');
        formEl.insertBefore(container, formEl.firstChild);
     }
     
     myAds = rawData.filter(ad => ownsPhone(ad[2]));
     selectedMyAds = []; // Reseta seleções
     
     if (myAds.length === 0) {
        container.innerHTML = '<p style="margin:0; color:#666; font-size:14px;">Não tem anúncios ativos associados aos seus telemóveis neste momento.</p>';
     } else {
        let html = '<h4 style="margin-top:0; margin-bottom:12px; color:#111; font-size:15px;">Os Meus Anúncios Ativos</h4>';
        html += '<div style="display:flex; flex-direction:column; gap:10px;">';
        myAds.forEach((ad, i) => {
           let desc = ad[3].length > 70 ? ad[3].substring(0,70) + '...' : ad[3];
           html += `<label style="display:flex; align-items:flex-start; gap:10px; font-size:14px; cursor:pointer; padding:8px; border-radius:6px; background:#fff; border:1px solid #ddd; transition: border 0.2s;">
                      <input type="checkbox" class="my-ad-chk" data-idx="${i}" style="margin-top:3px; transform: scale(1.1);">
                      <div style="line-height:1.4;">
                        <div style="font-weight:600; color:#333;">${ad[1]} <span style="font-weight:normal; color:#666; margin-left:6px;">(${ad[2]})</span></div>
                        <div style="color:#555;">${desc}</div>
                      </div>
                    </label>`;
        });
        html += '</div>';
        html += '<div style="margin-top:10px; font-size:12px; color:#888;">(Selecione 1 anúncio para o Editar, ou vários para os Apagar)</div>';
        container.innerHTML = html;
        
        document.querySelectorAll('.my-ad-chk').forEach(chk => {
           chk.addEventListener('change', handleAdSelection);
        });
     }
     setupFormButtons();
  }

  function setupFormButtons() {
     const btnOriginal = document.getElementById('botaoSubmeter');
     if (!btnOriginal) return;
     
     // Recicla o botão existente para "Publicar"
     btnOriginal.textContent = 'Publicar anúncio';
     btnOriginal.onclick = function(e) { e.preventDefault(); processarGestao('add'); };
     
     // Cria o botão de Atualizar
     let btnUpdate = document.getElementById('btnAtualizar');
     if (!btnUpdate) {
        btnUpdate = document.createElement('button');
        btnUpdate.id = 'btnAtualizar';
        btnUpdate.textContent = 'Atualizar anúncio';
        btnUpdate.style.display = 'none';
        btnUpdate.style.marginLeft = '12px';
        btnUpdate.style.padding = '8px 16px';
        btnUpdate.style.backgroundColor = '#2563eb'; // Azul premium
        btnUpdate.style.color = '#fff';
        btnUpdate.style.border = 'none';
        btnUpdate.style.borderRadius = '6px';
        btnUpdate.style.cursor = 'pointer';
        btnUpdate.onclick = function(e) { e.preventDefault(); processarGestao('update'); };
        btnOriginal.parentNode.insertBefore(btnUpdate, btnOriginal.nextSibling);
     }
     
     // Cria o botão de Apagar
     let btnDelete = document.getElementById('btnApagar');
     if (!btnDelete) {
        btnDelete = document.createElement('button');
        btnDelete.id = 'btnApagar';
        btnDelete.textContent = 'Apagar anúncio(s)';
        btnDelete.style.display = 'none';
        btnDelete.style.marginLeft = '12px';
        btnDelete.style.padding = '8px 16px';
        btnDelete.style.backgroundColor = '#dc2626'; // Vermelho perigo
        btnDelete.style.color = '#fff';
        btnDelete.style.border = 'none';
        btnDelete.style.borderRadius = '6px';
        btnDelete.style.cursor = 'pointer';
        btnDelete.onclick = function(e) { e.preventDefault(); processarGestao('delete'); };
        btnUpdate.parentNode.insertBefore(btnDelete, btnUpdate.nextSibling);
     }
     
     handleAdSelection(); // Aplica visibilidade base
  }

  function handleAdSelection() {
     const chks = document.querySelectorAll('.my-ad-chk');
     selectedMyAds = [];
     chks.forEach(chk => { if (chk.checked) selectedMyAds.push(myAds[chk.getAttribute('data-idx')]); });
     
     const btnOriginal = document.getElementById('botaoSubmeter');
     const btnUpdate = document.getElementById('btnAtualizar');
     const btnDelete = document.getElementById('btnApagar');
     
     if (selectedMyAds.length === 0) {
        // Nada selecionado -> Modo Criação
        document.getElementById('anuncioTelefone').value = '';
        document.getElementById('anuncioTipo').selectedIndex = 0; 
        document.getElementById('anuncioEntrada').value = '';
        document.getElementById('anuncioDescricao').value = '';
        
        if(btnOriginal) btnOriginal.style.display = 'inline-block';
        if(btnUpdate) btnUpdate.style.display = 'none';
        if(btnDelete) btnDelete.style.display = 'none';
     } else if (selectedMyAds.length === 1) {
        // 1 selecionado -> Modo Edição. Copia os valores para o form!
        const ad = selectedMyAds[0];
        
        const tipoSel = document.getElementById('anuncioTipo');
        for(let i=0; i<tipoSel.options.length; i++){
            if(tipoSel.options[i].value === ad[1] || tipoSel.options[i].text === ad[1]) {
                tipoSel.selectedIndex = i; break;
            }
        }

        // NOVO: Seleciona o telemóvel correto na lista suspensa
        const telSel = document.getElementById('anuncioTelefone');
        const adTelD = ad[2].replace(/\D/g, '');
        for(let i=0; i<telSel.options.length; i++){
            const optVal = telSel.options[i].value.replace(/\D/g, '');
            if(optVal === adTelD || optVal.endsWith(adTelD) || adTelD.endsWith(optVal)) {
                telSel.selectedIndex = i; break;
            }
        }

        document.getElementById('anuncioDescricao').value = ad[3];
        document.getElementById('anuncioEntrada').value = ad[4] || '';
        
        if(btnOriginal) btnOriginal.style.display = 'none';
        if(btnUpdate) btnUpdate.style.display = 'inline-block';
        if(btnDelete) btnDelete.style.display = 'inline-block';
     } else {
        // Vários selecionados -> Modo Destruição
        document.getElementById('anuncioTelefone').value = '';
        document.getElementById('anuncioDescricao').value = '';
        document.getElementById('anuncioEntrada').value = '';
        
        if(btnOriginal) btnOriginal.style.display = 'none';
        if(btnUpdate) btnUpdate.style.display = 'none';
        if(btnDelete) btnDelete.style.display = 'inline-block';
     }
  }

  function processarGestao(action) {
     if (envioEmCurso) return;
     
     const telRaw = document.getElementById('anuncioTelefone').value;
     const tipo = (document.getElementById('anuncioTipo').value || '').trim();
     const descricao = (document.getElementById('anuncioDescricao').value || '').trim();
     const entrada = (document.getElementById('anuncioEntrada').value || '').trim();
     
     let payload = { action: action };
     
     if (action === 'add' || action === 'update') {
        const norm = normalizePhone(telRaw);
        if (!norm.ok) { alert('Número de telemóvel inválido.'); return; }
        if (!tipo) { alert('Selecione o tipo de anúncio.'); return; }
        if (descricao.length < 10) { alert('A descrição deve ter pelo menos 10 caracteres.'); return; }
        payload.novo = ['', tipo, norm.pretty, descricao, entrada];
     }
     if (action === 'update') payload.original = selectedMyAds[0];
     if (action === 'delete') {
        if (!confirm('Tem a certeza que deseja apagar ' + selectedMyAds.length + ' anúncio(s)?')) return;
        payload.originais = selectedMyAds;
     }
     
     envioEmCurso = true;
     document.getElementById('spinner').style.display = 'block';
     
     const btnOriginal = document.getElementById('botaoSubmeter');
     const btnUpdate = document.getElementById('btnAtualizar');
     const btnDelete = document.getElementById('btnApagar');
     if(btnOriginal) btnOriginal.disabled = true;
     if(btnUpdate) btnUpdate.disabled = true;
     if(btnDelete) btnDelete.disabled = true;
     
     google.script.run.withSuccessHandler(function() {
        const msg = document.getElementById('mensagem-submissao');
        if (msg) {
           if (action === 'add') msg.textContent = '✅ Anúncio publicado com sucesso!';
           if (action === 'update') msg.textContent = '✅ Anúncio atualizado com sucesso!';
           if (action === 'delete') msg.textContent = '✅ Anúncio(s) apagado(s) com sucesso!';
           msg.style.display = 'block';
           setTimeout(function(){ msg.style.display = 'none'; }, 6000);
        }
        
        envioEmCurso = false;
        document.getElementById('anuncioTelefone').value = '';
        document.getElementById('anuncioDescricao').value = '';
        document.getElementById('anuncioEntrada').value = '';
        if(btnOriginal) btnOriginal.disabled = false;
        if(btnUpdate) btnUpdate.disabled = false;
        if(btnDelete) btnDelete.disabled = false;
        
        loadTable(); // Recarrega a tabela final e as caixas de seleção
     }).withFailureHandler(function(err){
        document.getElementById('spinner').style.display = 'none';
        alert(err.message);
        envioEmCurso = false;
        if(btnOriginal) btnOriginal.disabled = false;
        if(btnUpdate) btnUpdate.disabled = false;
        if(btnDelete) btnDelete.disabled = false;
     }).apiGestaoAnuncios(SESSION_TICKET, payload);
  }

  function setupFilters() {
    const headerRow = document.getElementById('header-row');
    headerRow.innerHTML = '';
    const headers = ['Anúncio','Tipo','Telemóvel','Descrição com data de ocupação','Entrada'];
    const filterTypes = ['none','dropdown','dropdown','input','dropdown'];

    headers.forEach((h, i) => {
      const th = document.createElement('th');
      th.classList.add('sortable');
      th.innerHTML = h + ' <span class="sort-icon"></span>';
      th.addEventListener('click', () => {
        if (sortColumn === i) sortDirection *= -1; else { sortColumn = i; sortDirection = 1; }
        updateSortIcons();
        applyFilters();
      });
      headerRow.appendChild(th);
    });

    const filterRow = document.querySelector('.filter-row');
    if (filterRow) {
      filterRow.innerHTML = '';
      headers.forEach((_, i) => {
        const th = document.createElement('th');
        if (filterTypes[i] === 'dropdown') {
          const select = document.createElement('select');
          let unique = [...new Set(rawData.map(row => formatCell(row[i], i)))];
          if (i === 2) { // Telemóvel: ordenar por dígitos
            unique.sort((a,b) => (a||'').replace(/\s+/g,'').localeCompare((b||'').replace(/\s+/g,''), undefined, { numeric: true }));
          } else {
            unique.sort();
          }
          if (i === 4 && !unique.includes('')) unique.push('');
          let options = '<option value="">Todos</option>';
          unique.forEach(function(val){ options += '<option>' + (val === '' ? '[Vazio]' : val) + '</option>'; });
          select.innerHTML = options;
          select.addEventListener('change', applyFilters);
          th.appendChild(select);
        } else if (filterTypes[i] === 'input') {
          const input = document.createElement('input');
          input.placeholder = 'Filtrar';
          input.addEventListener('input', applyFilters);
          th.appendChild(input);
        }
        filterRow.appendChild(th);
      });
    }
  }

  function updateSortIcons() {
    const headerCells = document.querySelectorAll('#header-row th');
    headerCells.forEach((th, i) => {
      const icon = th.querySelector('.sort-icon');
      if (!icon) return;
      if (i === sortColumn) icon.textContent = (sortDirection === 1 ? '▲' : '▼');
      else icon.textContent = '';
    });
  }

  function applyFilters() {
    let filteredData = rawData.slice();

    const filterRow = document.querySelector('.filter-row');
    const filters = Array.from(filterRow.querySelectorAll('input, select')).map(el => (el.value||'').trim().toLowerCase());

    filteredData = filteredData.filter(row => {
      return row.every((cell, idx) => {
        if (idx === 0) return true; // não há filtro na primeira coluna (data)
        const filter = filters[idx-1];
        if (!filter) return true;
        const formatted = (formatCell(cell, idx) || '').toString().toLowerCase();
        if (filter === '[vazio]') return formatted === '';
        return formatted.includes(filter);
      });
    });

    if (sortColumn >= 0) {
      filteredData.sort((a, b) => {
        let valA = a[sortColumn], valB = b[sortColumn];
        if (sortColumn === 0) { valA = new Date(valA); valB = new Date(valB); }
        if (valA instanceof Date && !isNaN(valA) && valB instanceof Date && !isNaN(valB)) {
          return (valA.getTime() - valB.getTime()) * sortDirection;
        }
        if (valA > valB) return sortDirection;
        if (valA < valB) return -sortDirection;
        return 0;
      });
    }

    createTable(filteredData);
    const contador = document.getElementById('contador');
    if (contador) contador.textContent = 'Mostrando ' + filteredData.length + ' anúncios';
  }

  function createTable(data) {
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = '';
    data.forEach(row => {
      const tr = document.createElement('tr');
      row.forEach((cell, i) => {
        const td = document.createElement('td');
        td.textContent = formatCell(cell, i);
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    const total = document.getElementById('contador');
    if (total) total.textContent = 'Total: ' + data.length + ' anúncios';
  }

  function formatCell(cell, index) {
    if (index === 0) {
      const date = new Date(cell);
      if (!isNaN(date)) return date.toISOString().split('T')[0];
    }
    return cell;
  }

  function toggleFormulario() {
    const f = document.getElementById('formulario');
    const isVisible = (f.style.display === 'block');
    f.style.display = isVisible ? 'none' : 'block';
    if (!isVisible) window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function populatePhoneDropdown() {
     const select = document.getElementById('anuncioTelefone');
     if (!select || select.tagName.toLowerCase() !== 'select') return;

     select.innerHTML = ''; // Limpa o "A carregar..."
     
     if (myPhones.length === 0) {
        const opt = document.createElement('option');
        opt.value = "";
        opt.textContent = "Nenhum telemóvel registado";
        select.appendChild(opt);
        return;
     }

     myPhones.forEach(p => {
        const norm = normalizePhone(p);
        const formatado = norm.ok ? norm.pretty : p;
        
        const opt = document.createElement('option');
        opt.value = formatado;
        opt.textContent = formatado;
        select.appendChild(opt);
     });
  }

</script>
