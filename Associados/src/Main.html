<html>
  <head>
    <meta charset="utf-8" />
    <title>Área do Associado</title>
    <style>
      :root {
        --fg: #111;
        --muted: #666;
        --line: #e5e7eb;
        --chip: #eef2ff;
        --ok: #16a34a;
        --nok: #dc2626;
        --pend: #a16207;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        font-family:
          system-ui,
          Segoe UI,
          Roboto,
          Arial;
        background: #fff;
        color: var(--fg);
      }
      /* --- Estilos para o Cabeçalho Triplo --- */
      .header-grid {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 10px;
        padding-bottom: 20px;
        border-bottom: 1px solid #e5e7eb;
        margin-bottom: 20px;
      }
      .header-left { text-align: left; color: #6b7280; font-size: 18px; font-weight: 600; }
      .header-center { text-align: center; font-weight: bold; font-size: 16px; color: #111827; }
      .header-right { text-align: right; font-size: 14px; }

      /* Adaptação para telemóveis na vertical */
      @media (max-width: 768px) {
        .header-grid {
          grid-template-columns: 1fr; /* Passa a uma única coluna */
          text-align: center;
          gap: 5px;
        }
        .header-left, .header-right { text-align: center; }
        .header-center { order: -1; margin-bottom: 8px; } /* Força o título a aparecer em primeiro lugar no topo */
      }

      /* --- Estilo para o Rodapé --- */
      .footer-correcoes {
        text-align: center;
        margin-top: 40px;
        padding-top: 20px;
        border-top: 1px solid #e5e7eb;
        color: #6b7280;
        font-size: 14px;
      }
      .footer-correcoes a {
        color: #2563eb;
        text-decoration: none;
      }
      .footer-correcoes a:hover { text-decoration: underline; }

      .wrap {
        max-width: 1080px;
        margin: 16px auto;
        padding: 0 16px;
      }
      #header-actions {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      #who {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #who .muted {
        color: var(--muted);
      }
      #who img.avatar {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: 1px solid var(--line);
        object-fit: cover;
      }
      .section {
        margin: 18px 0;
      }
      .card {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px;
        margin: 12px 0;
      }
      .small {
        font-size: 12px;
      }
      .muted {
        color: var(--muted);
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      }
      .euro {
        font-variant-numeric: tabular-nums;
      }
      .line {
        margin: 6px 0;
      }
      .label {
        font-size: 12px;
        color: #666;
      }
      .value {
        font-size: 15px;
      }
      .wraptext {
        white-space: pre-wrap;
        word-break: break-word;
      }
      .stat-ok {
        color: var(--ok);
        font-weight: 600;
      }
      .stat-nok {
        color: var(--nok);
        font-weight: 600;
      }
      .stat-pend {
        color: var(--pend);
        font-weight: 600;
      }

      /* Info blocks */
      .info {
        display: grid;
        grid-template-columns: max-content 1fr;
        gap: 12px;
        align-items: stretch;
        margin: 18px 0;
      }
      .info .badge {
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        white-space: nowrap;
      }
      .info .box {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
      }
      .info .box.nowrap {
        white-space: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      .week-link {
        text-decoration: none;
        border-bottom: 1px dotted #9ca3af;
      }
      .week-link:hover {
        border-bottom-color: #111;
      }

      /* Botão básico */
      .btn {
        display: inline-block;
        padding: 6px 10px;
        border: 1px solid #999;
        border-radius: 8px;
        background: #fff;
        cursor: pointer;
        text-decoration: none;
      }
      /* Transações — largura ao conteúdo, não estica ao cartão */
      /* a tabela encolhe ao conteúdo e não “cola” à borda do card */
      #tx-table {
        width: max-content;
      }
      #transacoes-card {
        overflow-x: auto;
      }
      #transacoes-card table.tx {
        width: max-content;
        max-width: 100%;
        border-collapse: separate;
        border-spacing: 0;
      }
      #transacoes-card .tx th,
      #transacoes-card .tx td {
        padding: 6px 0;
        white-space: nowrap;
        font-size: 15px;
      }
      /* espaçamento “2ch” entre colunas */
      #transacoes-card .tx th + th,
      #transacoes-card .tx td + td {
        padding-left: 2ch;
      }

      /* Alinhamentos pedidos */
      #transacoes-card .tx th:nth-child(1),
      #transacoes-card .tx td:nth-child(1) {
        text-align: left;
      }
      #transacoes-card .tx th:nth-child(2),
      #transacoes-card .tx td:nth-child(2) {
        text-align: right;
        min-width: 17ch;
        font-variant-numeric: tabular-nums;
      }
      #transacoes-card .tx th:nth-child(3),
      #transacoes-card .tx td:nth-child(3) {
        text-align: right;
        min-width: 8ch;
        font-variant-numeric: tabular-nums;
      }
	  
	        /* === RESPONSIVIDADE PARA PC / TABLETS === */
      @media (min-width: 768px) {
        .header { padding: 14px 24px; }
        .title { font-size: 22px; }
        .title span { font-size: 15px !important; }
        .label { font-size: 14px; }
        .value { font-size: 18px; }
        .small { font-size: 14px; }
        .card { padding: 20px; }
        .info .badge { font-size: 15px; padding: 12px 18px; }
        .info .box { font-size: 16px; padding: 12px 18px; }
        .info .box.euro { font-size: 17px; }
        #transacoes-card .tx th,
        #transacoes-card .tx td { font-size: 17px; }
        #btn-logout { font-size: 14px !important; padding: 6px 14px !important; }
      }
    </style>

    <script>
    /* PB Server Vars — 1.º <script> no <head> (sem efeitos colaterais) */
    (function () {
      // Defensivo: usar typeof para evitar ReferenceError no template
      var SV = { //usar como __SERVER_VARS. no código
        canonUrl:   "<?= (typeof CANON_URL  !== 'undefined' ? CANON_URL  : '') ?>",
        ticket:     "<?= (typeof TICKET     !== 'undefined' ? TICKET     : (typeof ticket !== 'undefined' ? ticket : '')) ?>",
        autostart:  "<?= (typeof AUTOSTART  !== 'undefined' ? AUTOSTART  : '') ?>",   // '1' | ''
        debugServer:"<?= (typeof DEBUG      !== 'undefined' ? DEBUG      : '') ?>" === "1",
        serverLog:  `<?= (typeof SERVER_LOG !== 'undefined' ? SERVER_LOG : '') ?>`,
        wipe:       "<?= (typeof WIPE       !== 'undefined' ? WIPE       : '') ?>",   // '1' | ''
        pageTag:    "<?= (typeof PAGE_TAG   !== 'undefined' ? PAGE_TAG   : '') ?>" // etiqueta para prefixo nos logs ex.: 'LOGIN' | 'RGPD' | 'MAIN'
      };

      // Flags calculadas no cliente
      SV.noRedirect = /[?&]noredirect=1\b/i.test(location.search);

      const CANON_SELF = location.origin + location.pathname;

      SV.canonSelf = CANON_SELF;
      window.CANON_SELF = CANON_SELF;

      // Persistir: self (embed) e canon (/exec) se existir
      try { localStorage.setItem("appSelfUrl", CANON_SELF); } catch(_) {}
      try { if ((SV.canonUrl || "").trim()) localStorage.setItem("appCanonicalUrl", SV.canonUrl.trim()); } catch(_) {}

      // Expor de forma limpa
      window.__SERVER_VARS = Object.freeze(SV);

      // Ponte mínima (se quiser eliminar depois, pode)
      window.CANON_URL      = SV.canonUrl;
      window.SESSION_TICKET = SV.ticket;
      window.SERVER_LOG     = SV.serverLog;

      // --- Stubs anti-erro: garantem que log/dbg existem MESMO antes do logger carregar
      window.log = window.log || function(){ try{ console.log.apply(console, arguments); }catch(_){} };
      window.dbg = window.dbg || function(){};
  })();
  </script>

  <script>
    // Flag global reutilizável (standalone=false, embed externo=true)
    (function () {
      function isAppsScript(o) {
        return /^(https:\/\/[-\w.]*script\.googleusercontent\.com|https:\/\/script\.google\.com)$/i.test(
          o,
        );
      }
      function computeExternalEmbed() {
        var inFrame = true;
        try {
          inFrame = window.top !== window.self;
        } catch (_) {
          inFrame = true;
        }
        var ao =
          (location.ancestorOrigins &&
            Array.from(location.ancestorOrigins)) ||
          [];
        return (
          inFrame &&
          ao.some(function (o) {
            return !isAppsScript(o);
          })
        );
      }
      window.EXTERNAL_EMBED = computeExternalEmbed(); // ← fica disponível globalmente
    })();
  </script>

    <script>
      const VERSION = "<?= VERSION ?>";

      (function () {        
        // 1) persistir ticket e limpar o query ?ticket=
        (function () {
          try {
            if (SESSION_TICKET) {
              localStorage.setItem("sessTicket", SESSION_TICKET);
              document.cookie =
                "sessTicket=" +
                encodeURIComponent(SESSION_TICKET) +
                "; Path=/; SameSite=Lax; Secure";
              const u = new URL(location.href);
              if (u.searchParams.has("ticket")) {
                u.searchParams.delete("ticket");
                u.searchParams.delete("ts"); // Limpa também o timestamp para ficar limpo
                history.replaceState({}, document.title, u.toString());
              }
            }
          } catch (_) {}
        })();

        // Avaliação rigorosa do debug
        const qs_global = new URLSearchParams(location.search);
        const WANT_DEBUG = (__SERVER_VARS.debugServer === true || qs_global.get("debug") === "1" || qs_global.get("Debug") === "1");
        (function () {

          const CANON       = __SERVER_VARS.canonUrl || (function(){ try{return localStorage.getItem('appCanonicalUrl')}catch(_){return ''} })() || (location.origin + location.pathname);
          const TPL_TICKET  = __SERVER_VARS.ticket || ''; // injeta o ticket do servidor
          //const WANT_DEBUG  = window.DEBUG;
          const IN_IFRAME = (function () {
            try { return window.top !== window.self; } catch (_) { return true; }
          })();
          const AO =
            (location.ancestorOrigins &&
              Array.from(location.ancestorOrigins)) ||
            [];
          const isAppsScript = (o) =>
            /^(https:\/\/[-\w.]*script\.googleusercontent\.com|https:\/\/script\.google\.com)$/i.test(o);
          const EXTERNAL_EMBED = IN_IFRAME && AO.some((o) => !isAppsScript(o));

          // Fallback ao storage se o template vier sem ticket:
          let t = TPL_TICKET;
          if (!t) {
            try { t = localStorage.getItem("sessTicket") || ""; } catch (_) {}
          }
          const BASE = CANON_URL;
          const u = new URL(BASE);
          if (t) u.searchParams.set("ticket", t);
          u.searchParams.set("go", "rgpd"); // <— forçar render RGPD no ramo do ticket

          if (WANT_DEBUG) u.searchParams.set("debug", "1");
          if (EXTERNAL_EMBED) u.searchParams.set("embed", "1"); // só para logging/diagnóstico no server
          if (!u.searchParams.has("ts")) u.searchParams.set("ts", String(Date.now()));
          //if (/\bdebug=1\b/i.test(location.search)) u.searchParams.set("debug", "1");


        })();

        const $ = (sel) => document.querySelector(sel);
        function fmtEUR(n) {
          try {
            return (n || 0).toLocaleString("pt-PT", {
              style: "currency",
              currency: "EUR",
            });
          } catch (_) {
            return String(n || 0);
          }
        }

        // === Helper local (só para logs bonitos)
        function _iso(d) {
          return d
            ? new Date(d.getTime() - d.getTimezoneOffset() * 60000)
                .toISOString()
                .slice(0, 10)
            : "—";
        }

        // === Cálculo dos trimestres completos para a Jóia, com debug
        function computeJoiaQuarters(adesaoStr) {
          // 1) parse robusto de datas PT / ISO
          function parsePtDate(s) {
            if (!s) return null;
            s = String(s).trim();
            if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
              // ISO
              const [y, m, d] = s.split(/[^\d]/).map(Number);
              return new Date(y, m - 1, d);
            }
            const m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
            if (m) {
              let d = +m[1],
                mo = +m[2] - 1,
                y = +m[3];
              if (y < 100) y += 2000;
              return new Date(y, mo, d);
            }
            const t = Date.parse(s);
            return isNaN(t) ? null : new Date(t);
          }

          // 2) mínimo = 26/03/2025 (meses 0-based ⇒ 2 = março)
          const MIN = new Date(2025, 2, 26);

          const ad = parsePtDate(adesaoStr);
          if (!ad) {
            try { log?.(`[joia] data inválida: ${adesaoStr}`); } catch (_) {}
            return 0;
          }

          const adj = ad < MIN ? MIN : ad;
          const y = adj.getFullYear();
          const m = adj.getMonth() + 1; // 1..12
          const q = Math.floor((m - 1) / 3) + 1; // 1..4
          const qstart = new Date(y, (q - 1) * 3, 1); // 1.º dia do trimestre
          const afterQstart = adj.getTime() > qstart.getTime() ? 1 : 0;
          const full = 5 - q - afterQstart; // 0..4

          try {
            log?.(
              `[joia] adesão=${_iso(ad)} → adj=${_iso(adj)} | ano=${y} | Q=${q} (qstart=${_iso(qstart)}) | afterQstart=${afterQstart} | trimestres=${full}`,
            );
          } catch (_) {}

          return Math.max(0, Math.min(4, full));
        }

        function fmtSemanasText(str, naoExibir) {
          const parts = String(str || "")
            .split(/[+,\s]+/)
            .filter(Boolean);
          if (!parts.length) return "";

          function esc(s) {
            return String(s).replace(
              /[&<>"']/g,
              (c) =>
                ({
                  "&": "&amp;",
                  "<": "&lt;",
                  ">": "&gt;",
                  '"': "&quot;",
                  "'": "&#39;",
                })[c],
            );
          }

          return parts
            .map((w) => {
              const label = esc(w);
              if (naoExibir) {
                // texto simples (sem link) quando naoExibir=true
                return `<span class="mono">${label}</span>`;
              }
              return `<a class="mono week-link" href="#" data-week="${label}" title="Descarregar FT-IPS">${label}</a>`;
            })
            .join('<span class="muted"> · </span>');
        }

        function cardLinha(c) {
          //Só se chega aqui quando houve uma contribuição de pelo menos um euro, o que significa que o estado é:
          // - 6: falta informação - pode-se exibir tudo. => Vai passar para 0V-Incompleto
          // - 9: já não é titular => Vai passar para 0Y-NãoTitular
          // - OK: tudo em ordem => Vai passar para 0Z-Completo


 
          //log?.(`[cardLinha] entrada`); //também funciona
          log?.("[cardLinha] entrada");

          const naoTitular = String(c.estado || "").trim() === "9" || String(c.estado || "").trim() === "0Y-NãoTitular";
          const rgpdAceite = !!c.rgpdOk;
          const saldoNeg = !!c.saldoNeg;

          // quando não mostrar nada de IPS nem links de semanas:
          let naoExibir = !rgpdAceite || saldoNeg || naoTitular;

          //log?.(`[cardLinha] naoExibir=${naoExibir}`);
          log?.("[cardLinha] naoExibir=" + naoExibir);

          // Prioridade das mensagens IPS
          // 1) se, se saldo negativo → "Regularize as quotas, por favor"
          // 2) senão RGPD não aceite → "Aceite o RGPD, por favor"
          // 3) senão, aplica a lógica anterior (placeholders quando naoTitular)
          let primTxt, outTxt;
          if (saldoNeg) {
            primTxt = outTxt = "Faça, por favor, pagamentos para atingir o valor das quotizações totais.";
          } else if (!rgpdAceite) {
            // Alterado para ficar vermelho com a classe 'stat-nok' (vermelho de erro definido no CSS)
            primTxt = outTxt = '<span class="stat-nok">Aceite o RGPD, por favor</span>';
          } else if (naoTitular) {
            primTxt = outTxt = "---";
          } else {
            //Apanha o caso das IPS não terem sido emitidas
            primTxt = c.primIPS && String(c.primIPS).trim() ? c.primIPS : "---";
            outTxt = c.outIPS && String(c.outIPS).trim() ? c.outIPS : "---";
          }

          // Texto de RGPD por cartão
          const rgpdTxt = rgpdAceite ? "Aceite" : '<span class="stat-nok">Rejeitado</span>';

          // IPS “data”/“estado” mantém a tua lógica atual (respeita o naoTitular)
          const dataIPSTxt = naoExibir ? "---" : c.dataIPS || "---";
          const statIPSTxt = naoExibir ? "---" : c.statIPS || "---";

          const tri = computeJoiaQuarters(c.adesaoRaw);
          log?.("[cardLinha] tri=" + tri);
          const joiaTxt =
            tri > 0
              ? `<div class="small muted">A jóia corresponde à quota de <b>${tri}</b> ${tri === 1 ? "trimestre" : "trimestres"} ${tri === 1 ? "completo" : "completos"} desde a data de adesão, não anterior a 26/3/2025, até ao fim desse ano.</div>`
              : "";

          log?.("[cardLinha] adesão e estado");

          // const adesaoTxt = naoTitular ? "---" : c.adesaoRaw || "---";
          const adesaoTxt = c.adesaoRaw || "---";
          log?.("[cardLinha] adesaoTxt=" + adesaoTxt);

          const numATxt = c.numA || "---";
          const nifTxt = c.nif || "---";
          const nomeFiscalTxt = c.nomeFiscal || "---";
          const fimTxt = c.fimRaw || "---";

          const estadoTxt = naoTitular
            ? '<span class="stat-nok">Deixou de ser titular</span>'
            : String(c.estado || "").trim() === "0Z-Completo"
              ? "Disponibilizou toda a informação"
              : String(c.estado || "").trim() === "0U-Incompleto"
                ? '<span class="stat-pend">Falta informação</span>'
                : c.estado || "?";

          log?.("[cardLinha] estadoTxt=" + estadoTxt);

          // helper p/ abrir RGPD (reutiliza o caminho go=rgpd)
          function rgpdLinkHtml() {
            return `<a href="#" class="rgpd-open small" title="Gerir RGPD">RGPD</a>`;
          }

          log?.("[cardLinha] antes do return");

          return `
            <div class="card">
              <div class="line">
                <div class="label">Registo: Número · Adesão · Fim · Estado · RGPD</div>
                <div class="value">
                  ${numATxt}
                   · ${adesaoTxt}
                   · ${fimTxt}
                   · ${estadoTxt}
                   · RGPD: <b>${rgpdTxt}</b> (${rgpdLinkHtml()})
                </div>
              </div>

              <div class="line">
                <div class="label">Semana(s)</div>
                <div class="value">${fmtSemanasText(c.semanas || "", naoExibir)}</div>
              </div>

              <div class="line">
                <div class="label">Identificação fiscal do associado: NIF · Nome completo</div>
                <div class="value">${nifTxt}· ${nomeFiscalTxt}</div>
              </div>

              <div class="line">
                <div class="label">IPS: Emissão · Validação</div>
                <div class="value">
                  · ${dataIPSTxt}
                  · ${statIPSTxt}
                </div>
              </div>
              <div class="line"><div class="label">Primeiro titular (IPS)</div><div class="value wraptext">${primTxt}</div></div>
              <div class="line"><div class="label">Outros titulares (IPS)</div><div class="value wraptext">${outTxt}</div></div>
              
              <div class="line"><div class="label">Nome(s) relacionado(s)</div><div class="value wraptext">${c.nomes || ""}</div></div>
              <div class="line"><div class="label">E-mail(s)</div><div class="value wraptext">${c.emails || ""}</div></div>
              <div class="line"><div class="label">Telemóvel(eis)</div><div class="value wraptext">${c.telefones || ""}</div></div>

              <div class="line">
                <div class="value euro">
                  Jóia: ${c.joia || "0,00 €"} ·
                  Quota deste ano: ${c.quota || "0,00 €"} ·
                  Quotização total: ${fmtEUR(c.quotizacao)} ·
                  Pagamentos: ${c.pago || "0,00 €"} ·
                  Saldo: <b>${c.saldo || "0,00 €"}</b>
                </div>
              </div>

              ${joiaTxt}
            </div>`;
        }

        function renderTransacoes(tx) {
          if (!tx || !tx.length) return;
          document.getElementById("transacoes-sec").style.display = "";

          function parsePt(val) {
            const s = String(val || "")
              .replace(/\s/g, "")
              .replace(/\./g, "")
              .replace(",", ".")
              .replace(/[^\d.\-]/g, "");
            const n = parseFloat(s);
            return isNaN(n) ? 0 : n;
          }
          const total = tx.reduce((sum, t) => sum + parsePt(t.amount), 0);

          // subtítulo <h4>
          const h4 = document.getElementById("tr-hint");
          if (h4) {
            h4.textContent = `Os movimentos associados ao(s) registo(s) na associação totalizam ${fmtEUR(total)}`;
          }

          const tb = document.querySelector("#tx-table tbody");
          tb.innerHTML = tx
            .map(
              (t) => `
            <tr>
              <td>${t.date || ""}</td>
              <td>${t.ref || ""}</td>
              <td class="euro">${t.amount || ""}</td>
            </tr>
          `,
            )
            .join("");
        }

        function escapeHtml(s) {
          return String(s || "").replace(
            /[&<>"']/g,
            (c) =>
              ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#39;",
              })[c],
          );
        }

        function render(data) {
          if (data?.log && Array.isArray(data.log)) {
            try { data.log.forEach((l) => log("[SV] " + l)); } catch (_) {}
          }

          try {
            log?.("[render] start");
            const name = data?.user?.name || "";
            const email = data?.user?.email || "";
            const pic = data?.user?.picture || "";

            const who = $("#who");
            if (who) {
              who.innerHTML =
                (pic
                  ? `<img class="avatar" src="${pic}" alt="" referrerpolicy="no-referrer" onerror="this.style.display='none'">`
                  : "") +
                `<span>${name || email}</span>` +
                (email ? ` <span class="muted">· ${email}</span>` : "");
            }

            const cards = data?.cardsLinhas || [];
            log?.("[render] cards=" + cards.length);
            const cardsHtml = cards.length
              ? cards.map(cardLinha).join("")
              : '<div class="muted">Sem registos associados a este e-mail.</div>';

            //log?.("[render] depois de cardLinha"); //Não funciona

            const QUOTAS = { T0: 2.5, T1: 3.75, T2: 5.0 };
            const sep = " · ";
            const quotasLine = [
              `T0: <b>${fmtEUR(QUOTAS.T0)}</b>`,
              `T1: <b>${fmtEUR(QUOTAS.T1)}</b>`,
              `T2: <b>${fmtEUR(QUOTAS.T2)}</b>`,
            ].join(sep);
            const quotasHtml = `
              <div class="info">
                <div class="badge">Quotas por tipo</div>
                <div class="box euro nowrap">${quotasLine}</div>
              </div>`;

            const T = data?.totais || {
              pago: 0,
              quota: 0,
              joia: 0,
              quotizacao: 0,
              saldo: 0,
            };
            const totalsHtml = `
              <div class="info">
                <div class="badge">Totais</div>
                <div class="box euro">
                  Jóias: <b>${fmtEUR(T.joia)}</b> ·
                  Quotas deste ano: <b>${fmtEUR(T.quota)}</b> ·
                  Quotizações totais: <b>${fmtEUR(T.quotizacao)}</b> ·
                  Pagamentos: <b>${fmtEUR(T.pago)}</b> ·
                  Saldo: <b>${fmtEUR(T.saldo)}</b>
                </div>
              </div>
              
              <div class="card muted small" style="background: #f9fafb; border-color: #d1d5db; line-height: 1.6; margin-top: 0;">
              A Informação Predial Simplificada (IPS) do Registo Predial está disponível para descarregar <b>quando o RGPD foi aceite e o saldo não é negativo</b>. Se, ao carregar sobre a semana X/Y, lhe surgir a mensagem "Sem FT-IPS para a semana X/Y", por favor contacte geral@titulares-portobelo.pt.<br><br>
              A quotização total representa a soma da jóia e das quotas de cada ano desde a adesão.<br>
              O saldo é calculado pela subtração das quotizações aos pagamentos. <b>Se o saldo for negativo</b>, o associado deve fazer o pagamento do montante do saldo.<br>
              Dado ainda não existir conta bancária da associação, pague através de <b>MB WAY</b> ou <b>Revolut</b> para o número <b>+351 967 012 590</b>. O MB WAY dará erro de limite após 50 pagamentos mensais. Pode também fazer na App do seu banco a transferência <b>por telemóvel/SPIN</b> para o mesmo número, ou para o <b>IBAN PT50 0018 0238 0020 0021 976 46</b>. Por favor, indique no descritivo pelo menos uma das suas semanas (104/30, por exemplo).<br>
              Os pagamentos já feitos, mostrados acima, podem ser temporariamente superiores ao total das transações bancárias, mostradas abaixo, enquanto estas últimas ainda não foram atualizadas.
              </div>`;

            $("#content").innerHTML = quotasHtml + cardsHtml + totalsHtml;

            // Anúncios (se houver)
            const anuncios = data?.anunciosPorTelefone || {};
            if (Object.keys(anuncios).length) {
              const chips = Object.entries(anuncios)
                .map(
                  ([tel, n]) =>
                    `<span class="mono" style="display:inline-block;border:1px solid #e5e7eb;border-radius:999px;padding:2px 8px;margin-right:6px;background:#eef2ff">${tel}: ${n}</span>`,
                )
                .join(" ");
              const html = `
                <div class="info">
                  <div class="badge">Anúncios</div>
                  <div class="box">${chips}</div>
                </div>`;
              document
                .querySelector("#content")
                .insertAdjacentHTML("beforeend", html);
            }
            // Transações
            renderTransacoes(
              data?.transacoes || [],
            );
            log?.("[render] content updated");
          } catch (e) {
            log?.("[render FATAL] " + (e && e.message));
            const pre = document.createElement("pre");
            pre.textContent = (e && e.stack) || String(e);
            const c = document.getElementById("content");
            if (c) {
              c.innerHTML = "";
              c.appendChild(pre);
            }
          }
        }

        // carregar dados
        (function load() {
          const ticket = (function () {
            try {
              return localStorage.getItem("sessTicket") || "";
            } catch (_) {
              return "";
            }
          })();
          if (!ticket) {
            $("#content").textContent = "Sessão inválida — por favor volte a entrar.";
            return;
          }

          google.script.run
            .withSuccessHandler(function (ok) {
              if (!ok) {
                $("#content").textContent = "Sessão inválida — por favor volte a entrar.";
                return;
              }
              google.script.run
                .withSuccessHandler(render)
                .withFailureHandler((err) => {
                  $("#content").textContent = "Erro a carregar: " + (err?.message || err);
                })
                .apiGetAssociados(ticket);
            })
            .isTicketValid(ticket, WANT_DEBUG ? 1 : 0);
        })();
      })();
    </script>
    <script>
      // Utilitário: cria e clica num <a download>
      function triggerDownloadFromB64(b64, mime, filename) {
        const bin = atob(b64);
        const buf = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
        const url = URL.createObjectURL(
          new Blob([buf], { type: mime || "application/pdf" }),
        );
        const a = document.createElement("a");
        a.href = url;
        a.download = filename || "FT-IPS.pdf";
        document.body.appendChild(a);
        a.click();
        setTimeout(() => {
          URL.revokeObjectURL(url);
          a.remove();
        }, 250);
      }

      // Lê ticket do storage/cookie
      function getSessTicket() {
        // 1) Ticket injectado no global (SESSION_TICKET)
        if (window.SESSION_TICKET) return String(window.SESSION_TICKET);
        // 2) Query string (quando a URL contém ?ticket=…)
        try {
          const t = new URL(location.href).searchParams.get('ticket');
          if (t) return t;
        } catch (_) {}
        // 3) localStorage (mesmo domínio)
        try {
          const t = localStorage.getItem('sessTicket') || '';
          if (t) return t;
        } catch (_) {}
        // 4) cookie (caso a app o tenha definido)
        try {
          const m = document.cookie.match(/(?:^|;)\\s*sessTicket=([^;]+)/);
          if (m) return decodeURIComponent(m[1]);
        } catch (_) {}
        return '';
      }

      // Clique numa semana => download imediato
      document.addEventListener("click", function (ev) {
        const a = ev.target.closest("a.week-link[data-week]");
        if (!a) return;

        ev.preventDefault();

        const week = a.getAttribute("data-week") || "";
        const ticket = getSessTicket();
        if (!ticket) {
          alert("Sessão inválida — entre novamente, por favor.");
          return;
        }
        if (!week) {
          alert("Semana inválida.");
          return;
        }

        const prevHtml = a.innerHTML;
        a.innerHTML = `<span class="muted">a preparar…</span>`;
        a.style.pointerEvents = "none";

        google.script.run
          .withSuccessHandler(function (res) {
            a.innerHTML = prevHtml;
            a.style.pointerEvents = "";
            if (!res || !res.ok) {
              alert(
                res && res.reason === "not_found"
                  ? `Sem FT-IPS para a semana ${week}.`
                  : `Não foi possível obter o PDF da semana ${week}.`,
              );
              return;
            }
            triggerDownloadFromB64(res.b64, res.mime, res.name);
          })
          .withFailureHandler(function (err) {
            a.innerHTML = prevHtml;
            a.style.pointerEvents = "";
            const msg = err && err.message ? err.message : String(err);
            alert("Erro ao preparar o download: " + msg);
          })
          .apiGetWeekIpsBase64(ticket, week);
      });

      function canonExec() {
        const sv = window.__SERVER_VARS || {};
        // usar o “self” (domínio userCodeAppPanel) se existir, senão o canónico
        //log("[Main.html canonExec] sv.canonSelf=" + sv.canonSelf || '' + "sv.canonUrl=" + sv.canonUrl || '' + "window.CANON_URL=" + window.CANON_URL || '' + "sv.CANON_URL=" + sv.CANON_URL || '');
        //log("[Main.html canonExec] sv.canonSelf=" + sv.canonSelf);
        //log("[Main.html canonExec] sv.canonUrl=" + sv.canonUrl);
        //log("[Main.html canonExec] window.CANON_URL=" + window.CANON_URL);
        //log("[Main.html canonExec] sv.CANON_URL=" + sv.CANON_URL);
        const url = (sv.canonUrl || window.CANON_URL || sv.CANON_URL || sv.canonSelf || '').trim();
        return url || (location.origin + location.pathname);
      }

      // Abrir RGPD a partir do link em cada cartão
      document.addEventListener("click", (ev) => {
        const a = ev.target && ev.target.closest ? ev.target.closest("a.rgpd-open") : null;
        if (!a) return;
        ev.preventDefault();

        const ticket = (typeof getSessTicket === "function") ? getSessTicket() : "";
        const u = new URL(canonExec());
        u.searchParams.set("go", "rgpd");
        if (ticket) u.searchParams.set("ticket", ticket);

        // Reposicionado para não apanhar lixo inesperado
        const qs_local = new URLSearchParams(location.search);
        const isDbg = (__SERVER_VARS.debugServer === true || qs_local.get("debug") === "1" || qs_local.get("Debug") === "1");
        if (isDbg) u.searchParams.set("debug", "1");

        u.searchParams.set("ts", String(Date.now()));

        log("[MAIN] navegar SÍNCRONO (top) → " + u.toString());
        // NOVO: Navegar a janela de topo via clique do rato para evitar aninhamento de iframes!
        try {
          if (window.top !== window.self) {
            window.top.location.href = u.toString();
          } else {
            location.replace(u.toString());
          }
        } catch (e) {
          // Fallback para cross-origin bloqueado
          window.open(u.toString(), "_top");
        }
      });

      // 2) Lógica do Botão Sair simplificada com navegação para a Sandbox Principal
      document.getElementById("btn-logout").addEventListener("click", function(ev) {
        ev.preventDefault();
        log("[MAIN] Iniciando processo de Sair... (9/3/2026 12:03)");
        
        // Eliminação Agressiva Antecipada na App Cliente
        try { localStorage.setItem("sessTicket", ""); localStorage.removeItem("sessTicket"); localStorage.clear(); } catch (_) {}
        try { sessionStorage.setItem("sessTicket", ""); sessionStorage.removeItem("sessTicket"); sessionStorage.clear(); } catch (_) {}
        try { 
          const paths = ['/', '/macros/s/', location.pathname];
          paths.forEach(function(p) {
            document.cookie = "sessTicket=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=" + p + "; SameSite=Lax; Secure";
            document.cookie = "sessTicket=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=" + p + ";";
          });
        } catch (_) {}
    
        // 3. Ocultar a app e mostrar feedback imediato DENTRO do iframe
        document.body.innerHTML = "<div style='text-align:center; padding:60px 20px; font-family:sans-serif;'>" +
                                        "<h3 style='color:#333;'>A encerrar sessão com segurança...</h3>" +
                                        "<p style='color:#777;'>A limpar dados do navegador.</p></div>";

        const sv = window.__SERVER_VARS || {};
        let url = (sv.canonUrl || window.CANON_URL || sv.canonSelf || location.origin + location.pathname).trim();
        // O TRUQUE MESTRE: Enviar para a Root URL com Hash #logout
        const u = new URL(url);
        if (window.location.search.includes('debug=1') || u.searchParams.has('debug')) {
            u.searchParams.set("debug", "1");
        }
        //u.hash = "logout"; // <-- Garante a abertura da Sandbox original
        // 2. Avisar o servidor para travar a Autenticação
        u.searchParams.set("action", "logout");
        
        log("[MAIN] A navegar para a sandbox base de logout...");
        // O SEGREDO ESTÁ AQUI: Dar tempo para o browser gravar a eliminação antes de destruir o iframe!
        setTimeout(function() {
          log("[MAIN] A navegar para: " + u.toString());
          try {
            if (window.top !== window.self) window.top.location.href = u.toString();
            else location.replace(u.toString());
          } catch (e) {
            window.open(u.toString(), "_top");
          }
        }, 600);
      });

    </script>
