        try {

        } catch (_) {}

        // Expor de forma limpa
        window.__SERVER_VARS = Object.freeze(SV);

        // Ponte mГ­nima (se quiser eliminar depois, pode)

      })();

    <script>
      // Flag global reutilizГЎvel (standalone=false, embed externo=true)
      (function () {
        function isAppsScript(o) {
          return /^(https:\/\/[-\w.]*script\.googleusercontent\.com|https:\/\/script\.google\.com)$/i.test(
            o,
          );
        }
        function computeExternalEmbed() {
          var inFrame = true;
          try {
            inFrame = window.top !== window.self;
          } catch (_) {
            inFrame = true;
          }
          var ao =
            (location.ancestorOrigins &&
              Array.from(location.ancestorOrigins)) ||
            [];
          return (
            inFrame &&
            ao.some(function (o) {
              return !isAppsScript(o);
            })
          );
        }
        window.EXTERNAL_EMBED = computeExternalEmbed(); // в†ђ fica disponГ­vel globalmente
      })();

    <script>
      const VERSION = "<?= VERSION ?>";

      //Valores a usar para msgSaldoText que define como mostrar o estado do registo do associado
      const MSG_SALDO_POS = "<?= MSG_SALDO_POS ?>";
      const MSG_SALDO_NUL = "<?= MSG_SALDO_NUL ?>";
      const MSG_SALDO_NEG = "<?= MSG_SALDO_NEG ?>";

      //Valores a usar para definir como mostrar o estado da informaГ§ГЈo predial
      const MSG_IPS_UNKNOWN = "<?= MSG_IPS_UNKNOWN ?>";
      const MSG_IPS_EMITIDA = "<?= MSG_IPS_EMITIDA ?>";
      const MSG_IPS_PENDENTE = "<?= MSG_IPS_PENDENTE ?>";
      const MSG_IPS_NOK = "<?= MSG_IPS_NOK ?>";
      const MSG_IPS_WAIT = "<?= MSG_IPS_WAIT ?>";
      const MSG_IPS_TITREG = "<?= MSG_IPS_TITREG ?>";
      const MSG_IPS_HERANCA = "<?= MSG_IPS_HERANCA ?>";
      const MSG_IPS_RENOVAR = "<?= MSG_IPS_RENOVAR ?>";
      const MSG_IPS_OK = "<?= MSG_IPS_OK ?>";

      (function () {
        // 1) persistir ticket e limpar o query ?ticket=
        (function () {
          try {
            if (SESSION_TICKET) {
              localStorage.setItem("sessTicket", SESSION_TICKET);
              document.cookie =
                "sessTicket=" +
                encodeURIComponent(SESSION_TICKET) +
                "; Path=/; SameSite=Lax; Secure";
              const u = new URL(location.href);
              if (u.searchParams.has("ticket")) {
                u.searchParams.delete("ticket");
                u.searchParams.delete("ts"); // Limpa tambГ©m o timestamp para ficar limpo
                history.replaceState({}, document.title, u.toString());
              }
            }
          } catch (_) {}
        })();

        // AvaliaГ§ГЈo rigorosa do debug
        const qs_global = new URLSearchParams(location.search);
        const WANT_DEBUG =
          __SERVER_VARS.debugServer === true ||
          qs_global.get("debug") === "1" ||
          qs_global.get("Debug") === "1";
        (function () {
          const CANON =
            __SERVER_VARS.canonUrl ||
            (function () {
              try {
                return localStorage.getItem("appCanonicalUrl");
              } catch (_) {
                return "";
              }
            })() ||
            location.origin + location.pathname;
          const TPL_TICKET = __SERVER_VARS.ticket || ""; // injeta o ticket do servidor
          //const WANT_DEBUG  = window.DEBUG;
          const IN_IFRAME = (function () {
            try {
              return window.top !== window.self;
            } catch (_) {
              return true;
            }
          })();
          const AO =
            (location.ancestorOrigins &&
              Array.from(location.ancestorOrigins)) ||
            [];
          const isAppsScript = (o) =>
            /^(https:\/\/[-\w.]*script\.googleusercontent\.com|https:\/\/script\.google\.com)$/i.test(
              o,
            );
          const EXTERNAL_EMBED = IN_IFRAME && AO.some((o) => !isAppsScript(o));

          // Fallback ao storage se o template vier sem ticket:
          let t = TPL_TICKET;
          if (!t) {
            try {
              t = localStorage.getItem("sessTicket") || "";
            } catch (_) {}
          }
          const BASE = CANON_URL;
          const u = new URL(BASE);
          if (t) u.searchParams.set("ticket", t);
          u.searchParams.set("go", "rgpd"); // <вЂ” forГ§ar render RGPD no ramo do ticket

          if (WANT_DEBUG) u.searchParams.set("debug", "1");
          if (EXTERNAL_EMBED) u.searchParams.set("embed", "1"); // sГі para logging/diagnГіstico no server
          if (!u.searchParams.has("ts"))
            u.searchParams.set("ts", String(Date.now()));
          //if (/\bdebug=1\b/i.test(location.search)) u.searchParams.set("debug", "1");
        })();

        const $ = (sel) => document.querySelector(sel);
        function fmtEUR(n) {
          try {
            return (n || 0).toLocaleString("pt-PT", {
              style: "currency",
              currency: "EUR",
            });
          } catch (_) {
            return String(n || 0);
          }
        }

        // === Helper local (sГі para logs bonitos)
        function _iso(d) {
          return d
            ? new Date(d.getTime() - d.getTimezoneOffset() * 60000)
                .toISOString()
                .slice(0, 10)
            : "вЂ”";
        }

        // === CГЎlculo dos trimestres completos para a JГіia, com debug
        function computeJoiaQuarters(adesaoStr) {
          // 1) parse robusto de datas PT / ISO
          function parsePtDate(s) {
            if (!s) return null;
            s = String(s).trim();
            if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
              // ISO
              const [y, m, d] = s.split(/[^\d]/).map(Number);
              return new Date(y, m - 1, d);
            }
            const m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
            if (m) {
              let d = +m[1],
                mo = +m[2] - 1,
                y = +m[3];
              if (y < 100) y += 2000;
              return new Date(y, mo, d);
            }
            const t = Date.parse(s);
            return isNaN(t) ? null : new Date(t);
          }

          // 2) mГ­nimo = 26/03/2025 (meses 0-based в‡’ 2 = marГ§o)
          const MIN = new Date(2025, 2, 26);

          const ad = parsePtDate(adesaoStr);
          if (!ad) {
            try {
              log?.(`[joia] data invГЎlida: ${adesaoStr}`);
            } catch (_) {}
            return 0;
          }

          const adj = ad < MIN ? MIN : ad;
          const y = adj.getFullYear();
          const m = adj.getMonth() + 1; // 1..12
          const q = Math.floor((m - 1) / 3) + 1; // 1..4
          const qstart = new Date(y, (q - 1) * 3, 1); // 1.Вє dia do trimestre
          const afterQstart = adj.getTime() > qstart.getTime() ? 1 : 0;
          const full = 5 - q - afterQstart; // 0..4

          try {
            log?.(
              `[joia] adesГЈo=${_iso(ad)} в†’ adj=${_iso(adj)} | ano=${y} | Q=${q} (qstart=${_iso(qstart)}) | afterQstart=${afterQstart} | trimestres=${full}`,
            );
          } catch (_) {}

          return Math.max(0, Math.min(4, full));
        }

        function fmtSemanasText(str, naoExibir) {
          const parts = String(str || "")
            .split(/[+,\s]+/)
            .filter(Boolean);
          if (!parts.length) return "";

          function esc(s) {
            return String(s).replace(
              /[&<>"']/g,
              (c) =>
                ({
                  "&": "&amp;",
                  "<": "&lt;",
                  ">": "&gt;",
                  '"': "&quot;",
                  "'": "&#39;",
                })[c],
            );
          }

          return parts
            .map((w) => {
              const label = esc(w);
              if (naoExibir) {
                // texto simples (sem link) quando naoExibir=true
                return `<span class="mono">${label}</span>`;
              }
              return `<a class="mono week-link" href="#" data-week="${label}" title="Descarregar FT-IPS">${label}</a>`;
            })
            .join('<span class="muted"> В· </span>');
        }

        function cardLinha(c) {
          //SГі se chega aqui quando houve uma contribuiГ§ГЈo de pelo menos um euro, o que significa que o estado Г©:
          // - 6: falta informaГ§ГЈo - pode-se exibir tudo. => Vai passar para 0V-Incompleto
          // - 9: jГЎ nГЈo Г© titular => Vai passar para 0Y-NГЈoTitular
          // - OK: tudo em ordem => Vai passar para 0Z-Completo

          //log?.(`[cardLinha] entrada`); //tambГ©m funciona
          log?.("[cardLinha] entrada");

          const rawEstado = String(c.estado || "").trim();
          const naoTitular = rawEstado === "0Y-NГЈoTitular";
          const rgpdAceite = !!c.rgpdOk;
          const saldoNeg = !!c.saldoNeg;

          // quando nГЈo mostrar nada de IPS nem links de semanas:
          let naoExibir = !rgpdAceite || saldoNeg || naoTitular;

          //log?.(`[cardLinha] naoExibir=${naoExibir}`);
          log?.("[cardLinha] naoExibir=" + naoExibir);

          // Prioridade das mensagens IPS
          // 1) se, se saldo negativo в†’ "Regularize as quotas, por favor"
          // 2) senГЈo RGPD nГЈo aceite в†’ "Aceite o RGPD, por favor"
          // 3) senГЈo, aplica a lГіgica anterior (placeholders quando naoTitular)
          let primTxt, outTxt;
          if (saldoNeg) {
            primTxt = outTxt =
              "FaГ§a, por favor, pagamentos para atingir o valor das quotizaГ§Гµes totais.";
          } else if (!rgpdAceite) {
            // Alterado para ficar vermelho com a classe 'stat-nok' (vermelho de erro definido no CSS)
            primTxt = outTxt =
              '<span class="stat-nok">Aceite o RGPD, por favor</span>';
          } else if (naoTitular) {
            primTxt = outTxt = "---";
          } else {
            //Apanha o caso das IPS nГЈo terem sido emitidas
            primTxt = c.primIPS && String(c.primIPS).trim()
					? escapeHtml(c.primIPS) 
					: "---";
            outTxt = c.outIPS && String(c.outIPS).trim()
				? escapeHtml(c.outIPS) 
				: "---";
          }

          // Texto de RGPD por cartГЈo
          const rgpdTxt = rgpdAceite
            ? "Aceite"
            : '<span class="stat-nok">Rejeitado</span>';

          // --- NOVO: Cores de Estado do Titular ---
          let estadoTxt = rawEstado || "---";
          if (rawEstado === "0Z-Completo") {
            estadoTxt = '<span class="stat-ok">O registo estГЎ completo</span>';
          } else if (rawEstado === "0Y-NГЈoTitular") {
            estadoTxt = '<span class="stat-nok">Deixou de ser titular</span>';
          } else if (rawEstado === "0S-Incompleto") {

    <script>
      // UtilitГЎrio: cria e clica num <a download>
      function triggerDownloadFromB64(b64, mime, filename) {
        const bin = atob(b64);
        const buf = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
        const url = URL.createObjectURL(
          new Blob([buf], { type: mime || "application/pdf" }),
        );
        const a = document.createElement("a");
        a.href = url;
        a.download = filename || "FT-IPS.pdf";
        document.body.appendChild(a);
        a.click();
        setTimeout(() => {
          URL.revokeObjectURL(url);
          a.remove();
        }, 250);
      }

      // LГЄ ticket do storage/cookie
      function getSessTicket() {
        // 1) Ticket injectado no global (SESSION_TICKET)
        if (window.SESSION_TICKET) return String(window.SESSION_TICKET);
        // 2) Query string (quando a URL contГ©m ?ticket=вЂ¦)
        try {
          const t = new URL(location.href).searchParams.get("ticket");
          if (t) return t;
        } catch (_) {}
        // 3) localStorage (mesmo domГ­nio)
        try {
          const t = localStorage.getItem("sessTicket") || "";
          if (t) return t;
        } catch (_) {}
        // 4) cookie (caso a app o tenha definido)
        try {
          const m = document.cookie.match(/(?:^|;)\\s*sessTicket=([^;]+)/);
          if (m) return decodeURIComponent(m[1]);
        } catch (_) {}
        return "";
      }

      // Clique numa semana => download imediato

          alert("SessГЈo invГЎlida вЂ” entre novamente, por favor.");
          return;
        }
        if (!week) {
          alert("Semana invГЎlida.");
          return;
        }

        const prevHtml = a.innerHTML;
        a.innerHTML = `<span class="muted">a prepararвЂ¦</span>`;
        a.style.pointerEvents = "none";

        google.script.run
          .withSuccessHandler(function (res) {
            a.innerHTML = prevHtml;
            a.style.pointerEvents = "";
            if (!res || !res.ok) {
              alert(
                res && res.reason === "not_found"
                  ? `Sem FT-IPS para a semana ${week}.`
                  : `NГЈo foi possГ­vel obter o PDF da semana ${week}.`,
              );
              return;
            }
            triggerDownloadFromB64(res.b64, res.mime, res.name);
          })
          .withFailureHandler(function (err) {
            a.innerHTML = prevHtml;
            a.style.pointerEvents = "";
            const msg = err && err.message ? err.message : String(err);
            alert("Erro ao preparar o download: " + msg);

      function canonExec() {
        const sv = window.__SERVER_VARS || {};
        // usar o вЂњselfвЂќ (domГ­nio userCodeAppPanel) se existir, senГЈo o canГіnico
        //log("[Main.html canonExec] sv.canonSelf=" + sv.canonSelf || '' + "sv.canonUrl=" + sv.canonUrl || '' + "window.CANON_URL=" + window.CANON_URL || '' + "sv.CANON_URL=" + sv.CANON_URL || '');

        //log("[Main.html canonExec] window.CANON_URL=" + window.CANON_URL);
        //log("[Main.html canonExec] sv.CANON_URL=" + sv.CANON_URL);
        const url = (
          sv.canonUrl ||
          window.CANON_URL ||
          sv.CANON_URL ||
          sv.canonSelf ||
          ""
        ).trim();
        return url || location.origin + location.pathname;
      }

      // Abrir RGPD a partir do link em cada cartГЈo
      document.addEventListener("click", (ev) => {
        const a =

            : null;
        if (!a) return;
        ev.preventDefault();

        const ticket =
          typeof getSessTicket === "function" ? getSessTicket() : "";
        const u = new URL(canonExec());
        u.searchParams.set("go", "rgpd");
        if (ticket) u.searchParams.set("ticket", ticket);

        // Reposicionado para nГЈo apanhar lixo inesperado
        const qs_local = new URLSearchParams(location.search);
        const isDbg =
          __SERVER_VARS.debugServer === true ||
          qs_local.get("debug") === "1" ||
          qs_local.get("Debug") === "1";
        if (isDbg) u.searchParams.set("debug", "1");

        u.searchParams.set("ts", String(Date.now()));

        log("[MAIN] navegar SГЌNCRONO (top) в†’ " + u.toString());
        // NOVO: Navegar a janela de topo via clique do rato para evitar aninhamento de iframes!
        try {
          if (window.top !== window.self) {
            window.top.location.href = u.toString();
          } else {
            location.replace(u.toString());
          }
        } catch (e) {
          // Fallback para cross-origin bloqueado
          window.open(u.toString(), "_top");
        }
      });

      // 2) LГіgica do BotГЈo Sair simplificada com navegaГ§ГЈo para a Sandbox Principal
      document
        .getElementById("btn-logout")
        .addEventListener("click", function (ev) {
          ev.preventDefault();
          log("[MAIN] Iniciando processo de Sair... (9/3/2026 12:03)");

          try {
            localStorage.setItem("sessTicket", "");
            localStorage.removeItem("sessTicket");
            localStorage.clear();
          } catch (_) {}
          try {
            sessionStorage.setItem("sessTicket", "");
            sessionStorage.removeItem("sessTicket");
            sessionStorage.clear();
          } catch (_) {}
          try {
            const paths = ["/", "/macros/s/", location.pathname];
            paths.forEach(function (p) {
              document.cookie =
                "sessTicket=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=" +

                "; SameSite=Lax; Secure";
              document.cookie =
                "sessTicket=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=" +

          // 3. Ocultar a app e mostrar feedback imediato DENTRO do iframe
          document.body.innerHTML =
            "<div style='text-align:center; padding:60px 20px; font-family:sans-serif;'>" +
            "<h3 style='color:#333;'>A encerrar sessГЈo com seguranГ§a...</h3>" +
            "<p style='color:#777;'>A limpar dados do navegador.</p></div>";

          const sv = window.__SERVER_VARS || {};
          let url = (
            sv.canonUrl ||
            window.CANON_URL ||
            sv.canonSelf ||
            location.origin + location.pathname
          ).trim();
          // O TRUQUE MESTRE: Enviar para a Root URL com Hash #logout
          const u = new URL(url);
          if (
            window.location.search.includes("debug=1") ||
            u.searchParams.has("debug")
          ) {
            u.searchParams.set("debug", "1");
          }
          //u.hash = "logout"; // <-- Garante a abertura da Sandbox original
          // 2. Avisar o servidor para travar a AutenticaГ§ГЈo
          u.searchParams.set("action", "logout");

          log("[MAIN] A navegar para a sandbox base de logout...");
          // O SEGREDO ESTГЃ AQUI: Dar tempo para o browser gravar a eliminaГ§ГЈo antes de destruir o iframe!
          setTimeout(function () {
            log("[MAIN] A navegar para: " + u.toString());
            try {
              if (window.top !== window.self)
                window.top.location.href = u.toString();
              else location.replace(u.toString());
            } catch (e) {
              window.open(u.toString(), "_top");
            }
          }, 600);
        });
    </script>
  </body>
