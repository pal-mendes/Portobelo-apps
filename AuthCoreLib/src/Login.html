      (function () {

          pageTag:"<?= (typeof PAGE_TAG   !== 'undefined' ? PAGE_TAG   : '') ?>", // etiqueta para prefixo nos logs ex.: 'LOGIN' | 'RGPD' | 'MAIN'
          // NOVAS VARIÁVEIS
          appTitle: "<?= (typeof APP_TITLE !== 'undefined' ? APP_TITLE : 'Área reservada a associados !!!') ?>",
          appPermissions: "<?= (typeof APP_PERMISSIONS !== 'undefined' ? APP_PERMISSIONS : '!!!') ?>"
        };

        // Flags calculadas no cliente
        SV.noRedirect = /[?&]noredirect=1\b/i.test(location.search);

        const CANON_SELF = location.origin + location.pathname;

        SV.canonSelf = CANON_SELF;
        window.CANON_SELF = CANON_SELF;

        // Persistir: self (embed) e canon (/exec) se existir
        try {
          localStorage.setItem("appSelfUrl", CANON_SELF);
        } catch (_) {}
        try {
          if ((SV.canonUrl || "").trim())
            localStorage.setItem("appCanonicalUrl", SV.canonUrl.trim());
        } catch (_) {}

        // Expor de forma limpa
        window.__SERVER_VARS = Object.freeze(SV);

        // Ponte mínima (se quiser eliminar depois, pode)
        window.CANON_URL = SV.canonUrl;
        window.SESSION_TICKET = SV.ticket;
        window.SERVER_LOG = SV.serverLog;

        // --- Stubs anti-erro: garantem que log/dbg existem MESMO antes do logger carregar
        window.log =
          window.log ||
          function () {
            try {
              console.log.apply(console, arguments);
            } catch (_) {}
          };
        window.dbg = window.dbg || function () {};
      })();
    </script>

    <script>
      // FUNÇÃO UNIVERSAL DE DESTRUIÇÃO DE SESSÃO
      function killLocalSession() {
        log("killLocalSession: Executando limpeza de localStorage e cookies (versão 9/3/2026 11:34)...");

        // 1. Matar LocalStorage e SessionStorage
        try {
          localStorage.setItem("sessTicket", "");
          localStorage.removeItem("sessTicket");
          localStorage.clear();
        } catch (e) {
          log("ERRO localStorage wipe: " + e);
        }
        try {
          sessionStorage.setItem("sessTicket", "");
          sessionStorage.removeItem("sessTicket");
          sessionStorage.clear();
        } catch (e) {
          log("ERRO sessionStorage wipe: " + e);
        }

        // 2. Matar Cookies em TODAS as combinações de paths possíveis do Google
        try {
          // Destrói cookies varrendo as combinações prováveis de domínios/paths do Google
          const paths = ["/", "/macros/s/", location.pathname];
          paths.forEach(function (p) {
            document.cookie =
              "sessTicket=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=" +
              p +
              "; SameSite=Lax; Secure";
            document.cookie =
              "sessTicket=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=" +
              p +
              ";";
          });
        } catch (e) {
          log("ERRO cookie wipe: " + e);
        }
      }
    </script>

    <!-- 1)Limpeza de Sessão (WIPE) -->
    <script>
      (function () {

        log("proceed with WIPE");
        window.STOP_LOGIN_FLOW = true; // Impede que o ecrã tente fazer o login

        // Obter o URL canónico correto para o botão de reentrar
        const loginUrl = __SERVER_VARS.canonUrl || location.origin + location.pathname;

        document.addEventListener("DOMContentLoaded", function () {

    <!-- 2)Fluxo de autenticação -->
    <script>
      (function () {
        log("fluxo de autenticação");
        if (window.STOP_LOGIN_FLOW) {
          log("STOP_LOGIN_FLOW");
          return; // Aborta a procura de tickets locais se for para limpar
        }
        log("prossegue fluxo de autenticação");

        const BTN = document.getElementById("login-link");
        const ST = document.getElementById("status");
        // Correção do Debug: Avalia de forma segura se o debug foi ativado pelo servidor ou pelo URL atual
        const qs = new URLSearchParams(location.search);
        const WANT_DEBUG =
          __SERVER_VARS.debugServer === true ||
          qs.get("debug") === "1" ||
          qs.get("Debug") === "1";
        const CANON_URL =
          __SERVER_VARS.canonUrl ||
          (function () {
            try {
              return localStorage.getItem("appCanonicalUrl");
            } catch (_) {
              return "";
            }
          })() || location.origin + location.pathname;

        // Configuração centralizada de tempos (ms)
        const UI_DELAY_HINT = 30000;  // Surge o aviso e a imagem
        const UI_DELAY_BTN  = 60000;  // Surge o botão de fallback
        const UI_DELAY_MAX  = 180000; // Desiste e pede refresh

        function setStatus(s, asHTML) {
          if (!ST) return;
          if (asHTML) ST.innerHTML = s;
          else ST.textContent = s;
        }

        function canonExec() {
          try {
            // Lê o URL exato onde o utilizador está (ex: .../dev ou .../exec)
            if (document.referrer && document.referrer.indexOf('script.google.com/macros/s/') !== -1) {
              log("canonExec: referrer script.google.com/macros/s/");
              return document.referrer.split('?')[0].split('#')[0];
            }
          } catch(e) {}
          const sv = window.__SERVER_VARS || {};
          log("canonExec: sv.canonUrl=", sv.canonUrl);
          log("canonExec: sv.CANON_URL=", sv.CANON_URL);
          log("canonExec: window.CANON_URL=", window.CANON_URL);
          log("canonExec: window.CANON=", window.CANON);
          let url = (
            sv.canonUrl ||
            sv.CANON_URL ||
            window.CANON_URL ||
            window.CANON ||
            ""
          ).trim();
          log("canonExec (sv): url=", url);
          if (url) return url;

          // 1. Tentar ler da cache (Main.html costuma guardar lá)
          try {
            url = localStorage.getItem("appCanonicalUrl") || "";
          } catch (_) {}
          log("canonExec (localStorage): url=", url);
          log("canonExec location=", location.origin + location.pathname);

          // 3. Fallback final
          return url || location.origin + location.pathname;
        }

        function persistTicket(t) {
          try {
            localStorage.setItem("sessTicket", t);
          } catch (e) {}
          try {
            document.cookie =
              "sessTicket=" +
              encodeURIComponent(t) +
              "; Path=/; Max-Age=2592000; SameSite=Lax; Secure";
          } catch (e) {}
        }

        function bestLocalTicket() {
          try {
            const t = localStorage.getItem("sessTicket");
            if (t) { log("bestLocalTicket: Ticket encontrado no LocalStorage!"); return t; }
          } catch (_) {}
          try {
            const m = (document.cookie || "").match(/(?:^|;\s*)sessTicket=([^;]+)/);
            if (m && m[1]) {
                log("bestLocalTicket: Ticket zombie encontrado no Cookie!");
                return decodeURIComponent(m[1]);
            }
          } catch (_) {}
          log("bestLocalTicket: Nenhum ticket local encontrado (Limpeza com sucesso).");
          return "";
        }

        function goWithTicket(ticket) {
          persistTicket(ticket); // IMPORTANTÍSSIMO: antes de mexer no location
          const u = new URL(canonExec());
          u.searchParams.set("ticket", ticket);

          // Usar a variável WANT_DEBUG corrigida (impede que debug=1 apareça do nada)
          if (WANT_DEBUG) u.searchParams.set("debug", "1");
          if (!u.searchParams.has("ts")) u.searchParams.set("ts", String(Date.now()));

          log("[LOGIN] goWithTicket preparado -> " + u.toString());

          // 1. Decodificar o email instantaneamente a partir do Payload do JWT (sem ir ao servidor)
          let email = "Desconhecido";
          try {
            const base64Url = ticket.split('.')[0];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const payload = JSON.parse(decodeURIComponent(escape(window.atob(base64))));
            email = payload.email || email;
          } catch(e) { log("Erro a ler JWT: " + e); }

          // SOLUÇÃO SANDBOX: O Chrome bloqueia navegações do window.top após callbacks assíncronos.
          // Em vez de redirecionar automaticamente, mostramos um botão "Entrar" para forçar um clique do utilizador.
          if (BTN) BTN.style.display = "none";

          // 2. Preparar o bloco de permissões (se existir)
          const appPerms = __SERVER_VARS.appPermissions 
            ? '<p style="font-size: 14px; color: #444; background: #f8f9fa; padding: 12px; border-radius: 8px; border: 1px solid #e9ecef; text-align: left; margin-bottom: 20px;">' + __SERVER_VARS.appPermissions + '</p>' 
            : '';

          // 3. Mostrar UI imediata
          setStatus(
            '<div style="text-align:center; padding: 10px 0;">' +
              '<div style="font-size: 40px; margin-bottom: 10px;">✅</div>' +
              '<h3 style="margin-top:0;">Sessão validada</h3>' +
              '<p style="margin-bottom: 15px; font-size: 15px;" id="valid-subtitle"><b>' + email + '</b> <span style="color:#666;">(A verificar perfil...)</span></p>' +
              appPerms +
              '<a href="' + u.toString() + '" target="_top" class="btn btn-primary">Entrar</a><br>' +
              '<a href="javascript:handleResetAccount()" class="btn btn-secondary">Selecionar outra conta Google</a>' +
            '</div>',
            true
          );

          // 4. Pedir ao servidor os dados de Quotas/RGPD de forma assíncrona para enriquecer o texto
          if (typeof google !== 'undefined' && google.script && google.script.run && google.script.run.getProfileStats) {
             google.script.run
               .withSuccessHandler(function(stats) {
                  if (!stats) return;
                  let roleText = "não associado";
                  
                  if (stats.hasLines && stats.pago >= 1) {
                      let quotaText = stats.saldo >= 0 ? "quotas em dia" : Math.abs(stats.saldo).toFixed(2).replace('.', ',') + " € de quotas em atraso";
                      let rgpdText = stats.rgpdState === 'total' ? "RGPD totalmente aceite" : "RGPD não aceite";
                      roleText = "associado com " + quotaText + " e " + rgpdText;
                  }
                  
                  const subEl = document.getElementById("valid-subtitle");
                  if (subEl) subEl.innerHTML = '<b>' + stats.email + '</b> <span style="color:#16a34a;">(' + roleText + ')</span>';
               })
               .withFailureHandler(function() {
                  const subEl = document.getElementById("valid-subtitle");
                  if (subEl) subEl.innerHTML = '<b>' + email + '</b>'; // Fallback em caso de erro
               })
               .getProfileStats(ticket);
          } else {
             const subEl = document.getElementById("valid-subtitle");
             if (subEl) subEl.innerHTML = '<b>' + email + '</b>';
          }
        }

        // Receber ticket via postMessage
        let popupRef = null;
        window.addEventListener("message", function (ev) {
          const d = (ev && ev.data) || {};
          if (d && d.type === "portobelo_ticket" && d.ticket) {
            log("ticket via postMessage");
            try {
              if (popupRef && !popupRef.closed) popupRef.close();
            } catch (_) {}
            goWithTicket(d.ticket);
          }
        });

        // Polling de fallback (3 min)
        function startServerPolling(nonce, authUrl, popupBlocked) {
          log("startServerPolling(" + nonce + ")");
          const t0 = Date.now();
          let delay = 1800;
          let done = false;

          // Se o popup foi bloqueado, mostramos o aviso quase logo (ex: 2 segundos)
          // Caso contrário, esperamos os 30s/60s normais
          const effectiveHintDelay = popupBlocked ? 2000 : UI_DELAY_HINT;
          const effectiveBtnDelay  = popupBlocked ? 3000 : UI_DELAY_BTN;

          // UI atrasada (hint) só se nada acontecer
          log("hintTimer=setTimeout()");
          const hintTimer = setTimeout(function () {
            if (!done) {
              setStatus(
                '<div class="alert-boxstyle="padding: 20px;">' + // Aumentado o padding interno
                  "<b>Aviso:</b> O processo está a demorar. Se o ecrã do Google não abriu, o seu navegador pode ter bloqueado a janela (muito comum em telemóveis, mas não só). " +
                  "É conveniente autorizar popups, redirecionamentos e cookies de terceiros, somente para esta aplicação.<br>" +
                  // Imagem das permissões (ajuste o ID abaixo com o ID real do ficheiro JPG) e use thumbnail. max-width pode ficar igual ao do body
                  '<img src="https://drive.google.com/thumbnail?id=1O8ZUhwGsBxHI-Ud9ZaknAp1Q9SkiZxYh&sz=w1000"' +
                  'style="width:100%; max-width:800px; border-radius:8px; display:block; margin: 15px auto; border: 1px solid #ddd;">' +
                  '<b>No telemóvel:</b> Se o ecrã ficar branco ou der erro, clique nos 3 pontinhos, normalmente no canto superior direito e escolha "Abrir no navegador...".<br>' +
                  '<b>No iPhone, a autorização é global.</b> Se não se importar, vá a Definições > Apps > Safari e desligue "Bloquear janelas pop-up" e "Impedir seguimento entre sites"<br>' +
                  '<br><b>Pode também esperar mais um pouco e carregar no botão que vai surgir aqui, que pode funcionar.</b><br>' +
                  '<div id="fallback-btn-container"></div>' + // Contentor vazio para o botão
                '</div>',
                true,
              );
            }
          }, effectiveHintDelay);

          // 2. Mostrar o BOTÃO
          const btnTimer = setTimeout(function () {
            if (!done) {
              const btnContainer = document.getElementById("fallback-btn-container");
              if (btnContainer) {
                btnContainer.innerHTML = '<a href="' + authUrl + '" target="_top" class="btn btn-primary">Clique aqui para Entrar</a>';
              }
            }
          }, effectiveBtnDelay);

          (function tick() {
            if (done) return;
            google.script.run
              .withSuccessHandler(function (ticket) {
                if (done) return;
                if (ticket) {
                  done = true;
                  clearTimeout(hintTimer);
                  clearTimeout(btnTimer); // Limpa também o timer do botão
                  log("server → ticket (" + String(ticket).slice(0, 12) + "…)");
                  try {
                    if (popupRef && !popupRef.closed) popupRef.close();
                  } catch (_) {}
                  goWithTicket(ticket);
                  return;
                }
                if (Date.now() - t0 > UI_DELAY_MAX) {
                  done = true;
                  setStatus("Tempo esgotado. Por favor, tente recarregar a página.");
                  return;
                }
                delay = Math.min(delay * 1.35, 6500);
                log("pollTicket success setTimeout()");
                setTimeout(tick, delay + Math.random() * 250);
              })
              .withFailureHandler(function () {
                if (done) return;
                if (Date.now() - t0 > UI_DELAY_MAX) {
                  done = true;
                  setStatus("Tempo esgotado. Por favor, tente recarregar a página.");
                  return;
                }
                delay = Math.min(delay * 1.35, 6500);
                log("pollTicket failure setTimeout()");
                setTimeout(tick, delay);
              })
              .pollTicket(nonce);
          })();
        }

        function beginAuthFlow(manualClick) {
          log("beginAuthFlow");
          const nonce = crypto && crypto.randomUUID ? crypto.randomUUID() : Date.now() + "." + Math.random();
          if (BTN) BTN.style.display = "none";
          setStatus("A preparar autenticação Google…");

          google.script.run
            .withSuccessHandler(function (authUrl) {
              log("[DEBUG-OAUTH] URL gerado para a Google: " + authUrl);
              // Tentativa 1: POPUP
              try {
                popupRef = window.open(authUrl, "portobeloAuth", "width=520,height=720");
              } catch (_) {
                log("popupRef / null");
                popupRef = null;
              }
              /*
              if (!popupRef) {
                // Se popup bloqueada:
                log("popup blocked");
                // A SALVAGUARDA GIGANTE PARA O FIREFOX MOBILE / SAFARI
                setStatus(
                  '<div class="alert-box">' +
                    "<b>Ação necessária:</b> O seu navegador de telemóvel bloqueou a janela de autenticação da Google.<br><br>" +
                    '<b>No telemóvel:</b> Se, ao prosseguir, o ecrã ficar branco ou der erro, clique nos 3 pontinhos no canto superior direito e escolha "Abrir no navegador / Chrome / Firefox".<br><br>' +
                    '<a href="' +
                    authUrl +
                    '" target="_top" class="btn btn-primary">Prosseguir para a Google</a></div>',
                  true,
                );
                return;
              }

              // Popup OK
              log("popup opened OK");
              setStatus("A autenticação abriu numa nova janela. Conclua o login nessa janela.");
              startServerPolling(nonce, authUrl);
              */
              log("popup opened " + (popupRef ? "OK" : "BLOCKED"));
              startServerPolling(nonce, authUrl, !popupRef);
            })
            .withFailureHandler(function (err) {
              log("buildAuthUrlFor fail: " + (err && err.message ? err.message : err));
              setStatus("Não foi possível iniciar a autenticação. Tente novamente.");
              if (BTN) BTN.style.display = "";
            })
            // AQUI É QUE PASSAMOS O URL DO CLIENTE (/dev ou /exec) PARA O SERVIDOR!
            .buildAuthUrlFor(nonce, WANT_DEBUG, window.top !== window, canonExec());
        }



        // Botão (para quando a pop-up automática falha ou NOREDIRECT)
        BTN.addEventListener("click", function (ev) {
          ev.preventDefault();
          beginAuthFlow(true);
        });

        // Bootstrap “seguro”: se já houver ticket local/cookie válido, vai direto
        (function bootstrap() {
          log("function bootstrap…");
          if (__SERVER_VARS.noRedirect) {
            if (BTN) BTN.style.display = "";
            return;
          }

          // O SEGREDO: Detetar o cavalo de troia (HASH) usando JS nativo (Sem causar erros na API da Google)
          let isLogout = false;
          try {
              if (window.location.hash.indexOf('logout') !== -1 || window.location.href.indexOf('#logout') !== -1) {
                  isLogout = true;
              }
          } catch(e) {}

          if (isLogout) {
            log("Cavalo de Troia: Hash #logout detetado na Sandbox principal! Destruindo memória...");
            window.STOP_LOGIN_FLOW = true;
            killLocalSession();

            // Tentar limpar o URL para não ficar sujo visualmente
            try { history.replaceState(null, null, ' '); } catch(e){}

            const loginUrl = __SERVER_VARS.canonUrl || location.origin + location.pathname;
            document.body.innerHTML =
              '<div style="text-align:center; padding: 50px 20px; font-family: system-ui, sans-serif;">' +
              '<h2 style="margin-bottom:20px; color:#22c55e;">Sessão terminada com sucesso.</h2>' +
              '<p style="color:#555; margin-bottom: 30px;">A sua sessão foi encerrada de forma estanque e segura.</p>' +
              '<a href="' + loginUrl + '" target="_top" style="display:inline-block; padding:12px 24px; background:#111; color:#fff; text-decoration:none; border-radius:8px; font-weight:500;">Entrar Novamente</a>' +
              '</div>';
            return;
          }

          // Se não for wipe, continua com o login normal
          const t = bestLocalTicket();
          if (!t) {
            // sem ticket → podemos autostartar popup (se AUTOSTART=1)
            const AUTOSTART = __SERVER_VARS.autostart;
            if (AUTOSTART) {
              // não mostra nada já: tenta popup; só mostra UI se falhar/atrasar
              beginAuthFlow(false);
            } else {
              if (BTN) BTN.style.display = "";
            }
            return;
          }

          log("bootstrap Found local ticket/cookie — validating…");
          google.script.run
            .withSuccessHandler(function (valid) {
              if (valid) {
                goWithTicket(t);
                return;
              }
              log("ticket inválido → wipe");
              killLocalSession(); // CHAMADA ADICIONADA AQUI TAMBÉM!
              setStatus("A sua sessão expirou.");
              if (BTN) BTN.style.display = "";
            })
            .withFailureHandler(function (err) {
              log(
                "validate fail: " +
                  (err && err.message ? err.message : err),
              );
              setStatus("Não foi possível validar a sessão.");
              if (BTN) BTN.style.display = "";
            })
            .isTicketValid(t, WANT_DEBUG ? 1 : 0);
        })();



      })();
      function handleResetAccount() {
        log("handleResetAccount()");
        
        // 1. Limpa o ticket do localStorage (use a constante que tiver definida para a chave)
        const KEY = "auth_ticket"; // Confirme se é este o nome da sua constante
        localStorage.removeItem(KEY);
        
        // 2. Limpa o cookie de backup (se o usar)
        document.cookie = KEY + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";

        // 3. Redireciona para o logout no servidor para mostrar a página de confirmação
        // O uso de ?action=logout invocará o ecrã de "Sessão terminada"
        const url = window.CANON_URL || ""; // Usa o URL detetado pela canonExec
        window.top.location.href = url + "?action=logout";
      }
    </script>
  </body>
</html>
